<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🚲 自行车店记账本</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#10b981;--green-light:#d1fae5;--red:#ef4444;--red-light:#fee2e2;--bg:#f2f3f5;--card:#fff;--text:#1f2937;--sub:#6b7280;--border:#e5e7eb;--primary:#2563eb;--orange:#f59e0b;--orange-light:#fef3c7}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:80px;font-size:14px}
header{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:10px 16px;position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:17px;font-weight:600}
.header-btns{display:flex;gap:6px}
.header-btns button{background:rgba(255,255,255,.2);border:0;color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#2563eb,#1d4ed8);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.login-screen h2{font-size:26px;color:#fff;margin-bottom:8px}
.login-screen .subtitle{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:28px}
.login-card{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:350px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-card .title{font-size:16px;font-weight:600;text-align:center;margin-bottom:16px}
.login-card input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;text-align:center;margin-bottom:12px;font-family:inherit}
.login-card input:focus{outline:0;border-color:var(--primary)}
.login-card .btn{width:100%;margin-bottom:8px}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:8px}
.store-bar{background:#fff;padding:6px 12px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--border);position:sticky;top:44px;z-index:49;scrollbar-width:none}
.store-bar::-webkit-scrollbar{display:none}
.store-tag{padding:5px 14px;border:1px solid var(--border);border-radius:16px;font-size:13px;background:#fff;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.store-tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:82px;z-index:48;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1 0 auto;min-width:fit-content;padding:10px 6px;border:0;background:none;font-size:13px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.page{display:none;padding:10px 14px}
.page.active{display:block}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.form-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.form-row>*{flex:1;min-width:0}
label{display:block;font-size:12px;color:var(--sub);margin-bottom:3px}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--card);-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:50px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:10px 16px;border:0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-block{width:100%}
.btn-ghost{background:none;color:var(--red);padding:6px 10px;font-size:12px}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-outline{background:var(--card);border:1px solid var(--border)}
.record-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);gap:8px;cursor:pointer}
.record-item:last-child{border-bottom:0}
.record-info{flex:1;min-width:0}
.record-info .name{font-size:14px;font-weight:600}
.record-info .meta{font-size:11px;color:var(--sub);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px}
.record-info .meta span{white-space:nowrap}
.record-amount{font-size:18px;font-weight:700;text-align:right;white-space:nowrap;min-width:70px}
.record-amount.income{color:var(--green)}
.record-amount.expense{color:var(--red)}
.record-amount.exchange{color:var(--orange)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.summary-item{background:var(--bg);border-radius:10px;padding:14px;text-align:center}
.summary-item .label{font-size:12px;color:var(--sub)}
.summary-item .value{font-size:22px;font-weight:700;margin-top:4px}
.filter-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-tag{padding:5px 14px;border:1px solid var(--border);border-radius:14px;font-size:12px;background:var(--card);cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.filter-tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.chart-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.chart-row .lbl{font-size:12px;min-width:50px;text-align:right}
.chart-row .bar-wrap{flex:1;height:20px;background:var(--bg);border-radius:10px;overflow:hidden}
.chart-row .bar{height:100%;border-radius:10px;min-width:4px}
.chart-row .bar.green{background:linear-gradient(90deg,#10b981,#34d399)}
.chart-row .bar.red{background:linear-gradient(90deg,#ef4444,#f87171)}
.chart-row .amt{font-size:11px;white-space:nowrap;color:var(--sub)}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-radius:10px;margin-bottom:6px}
.total-bar .label{font-size:14px;font-weight:600}
.total-bar .value{font-size:16px;font-weight:700}
.salary-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.salary-row:last-child{border-bottom:0}
.salary-row .sname{font-weight:600;min-width:50px;font-size:13px}
.salary-row .sval{font-size:13px;white-space:nowrap}
.section-title{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:8px}
.empty-state{text-align:center;padding:30px;color:var(--sub);font-size:14px}
.empty-state .icon{font-size:36px;margin-bottom:8px;display:block}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:18px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;margin:20px}
.modal h3{font-size:16px;margin-bottom:14px;text-align:center}
.modal .btn-row{display:flex;gap:8px;margin-top:14px}
.modal .btn-row button{flex:1}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:0}
.set-row span{font-size:14px;font-weight:500}
.set-row input{width:70px;text-align:center;padding:6px;display:inline}
.pay-summary{background:var(--green-light);padding:10px 12px;border-radius:8px;margin-top:8px;font-size:14px;font-weight:600;color:var(--green);text-align:center}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.detail-modal{background:var(--card);border-radius:16px;padding:20px;max-width:400px;width:90%}
.detail-modal .line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}
.detail-modal .line:last-child{border-bottom:0}
.detail-modal .line .val{font-weight:600}
.date-divider{text-align:center;font-size:11px;color:var(--sub);padding:12px 0 6px;font-weight:500}
@media(min-width:768px){body{max-width:500px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}header{position:relative}}</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen">
  <h2>🚲 自行车店记账本</h2>
  <p class="subtitle">喜德盛自行车 · 三店管理</p>
  <div class="login-card">
    <div class="title">选择登录方式</div>
    <input type="password" id="login-pwd" placeholder="管理员密码">
    <button class="btn btn-primary btn-block" onclick="doLogin('admin')">🔐 管理员登录</button>
    <button class="btn btn-outline btn-block" onclick="doLogin('staff')">👤 员工记账</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<header id="main-header" style="display:none">
  <h1>🚲 自行车店记账本</h1>
  <div class="header-btns">
    <button onclick="showSettings()" id="btn-settings" style="display:none">⚙️</button>
    <button onclick="logout()">退出</button>
  </div>
</header>

<div id="store-bar" class="store-bar" style="display:none">
  <button class="store-tag active" onclick="switchStore('all')">全部</button>
  <button class="store-tag" onclick="switchStore('东湖印象')">东湖印象</button>
  <button class="store-tag" onclick="switchStore('太古里')">太古里</button>
  <button class="store-tag" onclick="switchStore('新和县')">新和县</button>
</div>

<div id="tab-bar" class="tab-bar" style="display:none">
  <button class="tab-btn active" onclick="switchTab('income')">📥 收入</button>
  <button class="tab-btn" onclick="switchTab('expense')">📤 支出</button>
  <button class="tab-btn" onclick="switchTab('exchange')">💱 换钱</button>
  <button class="tab-btn admin-only" onclick="switchTab('salary')">💰 工资</button>
  <button class="tab-btn admin-only" onclick="switchTab('summary')">📊 汇总</button>
  <button class="tab-btn admin-only" onclick="switchTab('analysis')">📈 分析</button>
  <button class="tab-btn admin-only" onclick="switchTab('dict')">📖 字典</button>
</div>

<div id="page-income" class="page active">
  <div class="card">
    <h3>📥 记一笔收入</h3>
    <div class="form-row"><div><label>日期</label><input type="date" id="inc-date"></div><div><label>店铺</label><select id="inc-store"></select></div></div>
    <div class="form-row"><div><label>名称/项目</label><input type="text" id="inc-name" placeholder="如：售出山地车X1"></div><div><label>品类</label><select id="inc-cat"><option value="整车">整车</option><option value="配件">配件</option><option value="维修">维修</option><option value="二手">二手</option><option value="打包">打包</option><option value="废品回收">废品回收</option><option value="租赁">租赁</option><option value="其他">其他</option></select></div></div>
    <div class="form-row"><div><label>经办人</label><select id="inc-handler"><option value="">-- 选择经办人 --</option></select></div><div><label>成本 ¥</label><input type="number" id="inc-cost" placeholder="0" step="0.01" value="0" oninput="updateIncomeSum()"></div></div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:6px">💡 四种付款方式自动合计</div>
    <div class="form-row"><div><label>现金 ¥</label><input type="number" id="inc-cash" placeholder="0" step="0.01" value="0" oninput="updateIncomeSum()"></div><div><label>收款码 ¥</label><input type="number" id="inc-qr" placeholder="0" step="0.01" value="0" oninput="updateIncomeSum()"></div></div>
    <div class="form-row"><div><label>微信 ¥</label><input type="number" id="inc-wx" placeholder="0" step="0.01" value="0" oninput="updateIncomeSum()"></div><div><label>支付宝 ¥</label><input type="number" id="inc-zfb" placeholder="0" step="0.01" value="0" oninput="updateIncomeSum()"></div></div>
    <div id="inc-sum" class="pay-summary" style="display:none">合计：¥0.00</div>
    <div class="form-row"><div><label>备注</label><input type="text" id="inc-note" placeholder="选填"></div></div>
    <button class="btn btn-green btn-block" onclick="saveIncome()" style="margin-top:6px">✅ 记一笔收入</button>
  </div>
  <div id="income-list"></div>
</div>

<div id="page-expense" class="page">
  <div class="card">
    <h3>📤 记一笔支出</h3>
    <div class="form-row"><div><label>日期</label><input type="date" id="exp-date"></div><div><label>店铺</label><select id="exp-store"></select></div></div>
    <div class="form-row"><div><label>名称/项目</label><input type="text" id="exp-name" placeholder="如：进货配件"></div><div><label>品类</label><select id="exp-cat"><option value="进货">进货</option><option value="房租">房租</option><option value="水电">水电</option><option value="工资">工资</option><option value="运费">运费</option><option value="工具">工具</option><option value="广告">广告</option><option value="其他">其他</option></select></div></div>
    <div class="form-row"><div><label>经办人</label><select id="exp-handler"><option value="">-- 选择经办人 --</option></select></div></div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:6px">💡 四种付款方式自动合计</div>
    <div class="form-row"><div><label>现金 ¥</label><input type="number" id="exp-cash" placeholder="0" step="0.01" value="0" oninput="updateExpenseSum()"></div><div><label>收款码 ¥</label><input type="number" id="exp-qr" placeholder="0" step="0.01" value="0" oninput="updateExpenseSum()"></div></div>
    <div class="form-row"><div><label>微信 ¥</label><input type="number" id="exp-wx" placeholder="0" step="0.01" value="0" oninput="updateExpenseSum()"></div><div><label>支付宝 ¥</label><input type="number" id="exp-zfb" placeholder="0" step="0.01" value="0" oninput="updateExpenseSum()"></div></div>
    <div id="exp-sum" class="pay-summary" style="display:none">合计：¥0.00</div>
    <div class="form-row"><div><label>备注</label><input type="text" id="exp-note" placeholder="选填"></div></div>
    <button class="btn btn-red btn-block" onclick="saveExpense()" style="margin-top:6px">✅ 记一笔支出</button>
  </div>
  <div id="expense-list"></div>
</div>

<div id="page-exchange" class="page">
  <div class="card">
    <h3>💱 换钱</h3>
    <div class="form-row"><div><label>日期</label><input type="date" id="exc-date"></div><div><label>店铺</label><select id="exc-store"></select></div></div>
    <div class="form-row"><div><label>备注</label><input type="text" id="exc-note" placeholder="说明"></div></div>
    <div class="form-row"><div><label>现金变动 ¥</label><input type="number" id="exc-cash" placeholder="正数增加，负数减少" step="0.01" value="0"></div><div><label>收款码变动 ¥</label><input type="number" id="exc-qr" placeholder="正数增加，负数减少" step="0.01" value="0"></div></div>
    <button class="btn btn-orange btn-block" onclick="saveExchange()" style="margin-top:6px">✅ 记录换钱</button>
  </div>
  <div id="exchange-list"></div>
</div>

<div id="page-salary" class="page">
  <div class="card">
    <h3>💰 工资计算</h3>
    <div class="form-row"><div><label>选择月份</label><input type="month" id="salary-month" onchange="renderSalary()"></div></div>
    <div id="salary-content"></div>
  </div>
</div>

<div id="page-summary" class="page">
  <div class="filter-bar" id="summary-store-filter">
    <button class="filter-tag active" onclick="filterSummary('all')">全部</button>
    <button class="filter-tag" onclick="filterSummary('东湖印象')">东湖印象</button>
    <button class="filter-tag" onclick="filterSummary('太古里')">太古里</button>
    <button class="filter-tag" onclick="filterSummary('新和县')">新和县</button>
  </div>
  <div id="summary-content"></div>
</div>

<div id="page-analysis" class="page">
  <div class="filter-bar" id="analysis-store-filter">
    <button class="filter-tag active" onclick="filterAnalysis('all')">全部</button>
    <button class="filter-tag" onclick="filterAnalysis('东湖印象')">东湖印象</button>
    <button class="filter-tag" onclick="filterAnalysis('太古里')">太古里</button>
    <button class="filter-tag" onclick="filterAnalysis('新和县')">新和县</button>
  </div>
  <div id="analysis-content"></div>
</div>


<div id="page-dict" class="page">
  <div class="card">
    <h3>📖 字典设置</h3>
    <div class="form-row"><div><label>选择字典</label><select id="dict-type" onchange="renderDict()"><option value="stores">店铺</option><option value="income_cats">收入品类</option><option value="expense_cats">支出品类</option><option value="handlers">经办人</option></select></div></div>
    <div style="margin-bottom:8px"><div class="form-row"><div><input type="text" id="dict-new-item" placeholder="输入新项"></div><div style="flex:0 0 auto"><button class="btn btn-green btn-sm" onclick="addDictItem()" style="margin-top:17px">+ 添加</button></div></div></div>
    <div id="dict-item-list"></div>
  </div>
</div>
<div id="modal-settings" class="modal-overlay">
  <div class="modal">
    <h3>⚙️ 设置</h3>
    <div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:8px">品类提成比例 (%)</div><div id="settings-rate-list"></div></div>
    <div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:8px">管理员密码</div><input type="text" id="settings-pwd" placeholder="新密码（留空不修改）"></div>
    <div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:8px">📋 CSV 模板导入</div><button class="btn btn-outline btn-block" onclick="downloadCSVTemplate()" style="margin-bottom:6px">📥 下载模板</button><input type="file" id="csv-file-input" accept=".csv" style="display:none" onchange="importCSV(this)"><button class="btn btn-primary btn-block" onclick="document.getElementById('csv-file-input').click()">📤 导入CSV数据</button></div>
    <div class="btn-row"><button class="btn btn-outline" onclick="document.getElementById('modal-settings').classList.remove('show')">取消</button><button class="btn btn-primary" onclick="saveSettings()">保存设置</button></div>
  </div>
</div>


<div id="modal-edit" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal" style="max-height:90vh">
    <h3>✏️ 编辑记录</h3>
    <div id="edit-form-content"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="document.getElementById('modal-edit').classList.remove('show')">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 保存修改</button>
    </div>
  </div>
</div>
<div id="modal-detail" class="modal-overlay">
  <div class="detail-modal" id="detail-content"></div>
</div>

<div id="toast" class="toast"></div>

<script>

// ====== DATA MODEL ======
var DICT_DEFAULTS = {
  stores: ['东湖印象','太古里','新和县'],
  income_cats: ['整车','配件','维修','二手','打包','废品回收','租赁','其他'],
  expense_cats: ['进货','房租','水电','工资','运费','工具','广告','其他'],
  handlers: []
};
var PAY_METHODS = ['现金','收款码','微信','支付宝'];
var PAY_KEYS = ['cash','qr','wx','zfb'];

function loadDict() {
  try { return JSON.parse(localStorage.getItem('bike_dict')) || JSON.parse(JSON.stringify(DICT_DEFAULTS)); }
  catch(e) { return JSON.parse(JSON.stringify(DICT_DEFAULTS)); }
}
function saveDict(d) { localStorage.setItem('bike_dict', JSON.stringify(d)); }
function STORES() { return loadDict().stores; }
function INCOME_CATS() { return loadDict().income_cats; }
function EXPENSE_CATS() { return loadDict().expense_cats; }
function HANDLERS() { return loadDict().handlers || []; }
var DEFAULT_RATES = {'整车':10,'配件':25,'维修':25,'二手':25,'打包':50,'废品回收':70,'租赁':10,'其他':10};
function getDefaultRate(cat) { return DEFAULT_RATES[cat] || 10; }
var ADMIN_PWD = 'admin888';
var currentStore = 'all';
var currentTab = 'income';
var userRole = null;
var summaryStoreFilter = 'all';
var analysisStoreFilter = 'all';

// ====== STORAGE ======
function loadData(){try{return JSON.parse(localStorage.getItem('bike_ledger_data'))||{income:[],expense:[],exchange:[]}}catch(e){return{income:[],expense:[],exchange:[]}}}
function saveData(d){localStorage.setItem('bike_ledger_data',JSON.stringify(d))}
function loadSettings(){try{return JSON.parse(localStorage.getItem('bike_ledger_settings'))||{rates:{},pwd:ADMIN_PWD}}catch(e){return{rates:{},pwd:ADMIN_PWD}}}
function saveSettingsData(s){localStorage.setItem('bike_ledger_settings',JSON.stringify(s))}
function loadSalaryConfig(){try{return JSON.parse(localStorage.getItem('bike_ledger_salary'))||{}}catch(e){return{}}}
function saveSalaryConfig(sc){localStorage.setItem('bike_ledger_salary',JSON.stringify(sc))}
function getRate(cat){var s=loadSettings();if(s.rates&&s.rates[cat]!==undefined)return s.rates[cat];return getDefaultRate(cat)}
function fmt(n){return Number(n||0).toFixed(2)}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getMonth(d){return d?d.slice(0,7):''}
function filterByStore(records){if(currentStore==='all')return records;return records.filter(function(r){return r.store===currentStore})}
function staffTimeFilter(records){if(userRole!=='staff')return records;var twoD=Date.now()-2*24*60*60*1000;return records.filter(function(r){return new Date(r.date).getTime()>=twoD})}

function renderSalary(){if(userRole!=='admin')return;var data=loadData();var sc=loadSalaryConfig();var me=document.getElementById('salary-month');var month=me?me.value:'';var inc=data.income;if(month)inc=inc.filter(function(r){return getMonth(r.date)===month});var cm={};for(var i=0;i<inc.length;i++){var r=inc[i];if(r.handler){cm[r.handler]=(cm[r.handler]||0)+Math.max(0,(r.amount||0)-(r.cost||0))*(r.commRate||0)/100}}var nm={};for(var i=0;i<data.income.length;i++){if(data.income[i].handler)nm[data.income[i].handler]=true}for(var i=0;i<data.expense.length;i++){if(data.expense[i].handler)nm[data.expense[i].handler]=true}for(var k in sc)nm[k]=true;var names=[];for(var k in nm)names.push(k);names.sort();if(!me.value)me.value=new Date().toISOString().slice(0,7);var h='<div class="card"><h3>💵 工资计算 ('+(month||'全部')+')</h3>';var tp=0;if(names.length===0)h+='<div class="empty-state">暂无经办人数据</div>';else for(var i=0;i<names.length;i++){var n=names[i],cfg=sc[n]||{base:0,deduction:0},com=cm[n]||0,sal=cfg.base+com-cfg.deduction;tp+=sal;h+='<div class="salary-row"><span class="sname">'+esc(n)+'</span>';h+='<span style="font-size:11px">底薪</span><input type="number" value="'+cfg.base+'" style="width:60px;text-align:center;padding:3px" onchange="var r=this.closest(\'.salary-row\');var nm=r.querySelector(\'.sname\').textContent;updateBaseSalary(nm,this.value)">';h+='<span class="sval" style="color:var(--green);font-size:12px">提成 ¥'+fmt(com)+'</span>';h+='<span style="font-size:11px">扣除</span><input type="number" value="'+cfg.deduction+'" style="width:60px;text-align:center;padding:3px;color:var(--red)" onchange="var r=this.closest(\'.salary-row\');var nm=r.querySelector(\'.sname\').textContent;updateDeduction(nm,this.value)">';h+='<span class="sval" style="font-weight:700">实发 ¥'+fmt(sal)+'</span></div>'}h+='<div class="total-bar" style="margin-top:10px"><span class="label">合计实发</span><span class="value" style="color:var(--primary)">¥'+fmt(tp)+'</span></div></div>';document.getElementBy function updateBaseSalary(n,v){var sc=loadSalaryConfig();if(!sc[n])sc[n]={base:0,deduction:0};sc[n].base=parseFloat(v)||0;saveSalaryConfig(sc);renderSalary()}

v>';h+='<div class="line"><span>名称</span><span class="val">'+esc(rec.name||'-')+'</span></div>';h+='<div class="line"><span>品类</span><span class="val">'+esc(rec.cat)+'</span></div>';h+='<div class="line"><span>经办人</span><span class="val">'+esc(rec.handler||'-')+'</span></div>';h+='<div class="line"><span>总金额</span><span class="val" style="color:var(--red)">¥'+fmt(rec.amount)+'</span></div>';if(rec.cash)h+='<div class="line"><span>现金</span><span class="val">¥'+fmt(rec.cash)+'</span></div>';if(rec.qr)h+='<div class="line"><span>收款码</span><span class="val">¥'+fmt(rec.qr)+'</span></div>';if(rec.wx)h+='<div class="line"><span>微信</span><span class="val">¥'+fmt(rec.wx)+'</span></div>';if(rec.zfb)h+='<div class="line"><span>支付宝</span><span class="val">¥'+fmt(rec.zfb)+'</span></div>';if(rec.note)h+='<div class="line"><span>备注</span><span class="val">'+esc(rec.note)+'</span></div>'}else if(rec.type==='exchange'){h+='<h3>💱 换钱详情</h3>';h+='<div class="line"><span>日期</span><span class="val">'+rec.date+'</span></div>';h+='<div class="line"><span>店铺</span><span class="val">'+esc(rec.store)+'</span></div>';h+='<div class="line"><span>现金变动</span><span class="val">¥'+fmt(rec.cash)+'</span></div>';h+='<div class="line"><span>收款码变动</span><span class="val">¥'+fmt(rec.qr)+'</span></div>';if(rec.note)h+='<div class="line"><span>备注</span><span class="val">'+esc(rec.note)+'</span></div>'}h+='<button class="btn btn-outline btn-block" style="margin-top:12px;color:var(--red)" onclick="deleteRecord('+id+')">🗑 删除记录</button>';if(userRole==='admin')h+='<button class="btn btn-primary btn-block" style="margin-top:6px" onclick="document.getElementById(\'modal-detail\').classList.remove(\'show\');openEdit('+id+')">✏️ 编辑记录</button>';document.getElementById('detail-content').innerHTML=h;document.getElementById('modal-detail').classList.add('show')}

    h += '<div class="form-row"><div><label>经办人</label><select id="edit-handler"><option value="">-- 选择经办人 --</option></select></div><div><label>成本</label><input type="number" id="edit-cost" value="' + (rec.cost || 0) + '" step="0.01"></div></div>';

    h += '<div class="form-row"><div><label>备注</label><input type="text" id="edit-note" value="' + esc(rec.note || "") + '"></div></div>';
  } else if (rec.type === "expense") {
    h += '<div class="form-row"><div><label>日期</label><input type="date" id="edit-date" value="' + rec.date + '"></div><div><label>店铺</label><select id="edit-store"></select></div></div>';
    h += '<div class="form-row"><div><label>名称</label><input type="text" id="edit-name" value="' + esc(rec.name || "") + '"></div><div><label>品类</label><select id="edit-cat"></select></div></div>';
    h += '<div class="form-row"><div><label>经办人</label><select id="edit-handler"><option value="">-- 选择经办人 --</option></select></div></div>';
    h += '<div class="form-row"><div><label>现金</label><input type="number" id="edit-cash" value="' + (rec.cash || 0) + '" step="0.01"></div><div><label>收款码</label><input type="number" id="edit-qr" value="' + (rec.qr || 0) + '" step="0.01"></div></div>';
    h += '<div class="form-row"><div><label>微信</label><input type="number" id="edit-wx" value="' + (rec.wx || 0) + '" step="0.01"></div><div><label>支付宝</label><input type="number" id="edit-zfb" value="' + (rec.zfb || 0) + '" step="0.01"></div></div>';
    h += '<div class="form-row"><div><label>备注</label><input type="text" id="edit-note" value="' + esc(rec.note || "") + '"></div></div>';

  // Populate dropdowns
  var stores = STORES(); var ss = document.getElementById("edit-store"); if (ss) { ss.innerHTML = ""; for (var i = 0; i < stores.length; i++) ss.innerHTML += "<option value=\"" + esc(stores[i]) + "\"" + (stores[i] === rec.store ? " selected" : "") + ">" + esc(stores[i]) + "</option>"; }
  if (rec.type === "income") { var cats = INCOME_CATS(); } else { var cats = EXPENSE_CATS(); }

  var hs = document.getElementById("edit-handler"); if (hs) { var dict = loadDict(); var handlers = dict.handlers || []; var data2 = loadData(); for (var i = 0; i < data2.income.length; i++) { if (data2.income[i].handler && handlers.indexOf(data2.income[i].handler) < 0) handlers.push(data2.income[i].handler); } for (var i = 0; i < data2.expense.length; i++) { if (data2.expense[i].handler && handlers.indexOf(data2.expense[i].handler) < 0) handlers.push(data2.expense[i].handler); } for (var i = 0; i < handlers.length; i++) hs.innerHTML += "<option value=\"" + esc(handlers[i]) + "\"" + (handlers[i] === rec.handler ? " selected" : "") + ">" + esc(handlers[i]) + "</option>"; }

function saveEdit() {
  if (!editingId) return;
  var data = loadData();
  var all = data.income.concat(data.expense).concat(data.exchange);
  var rec = null;
  for (var i = 0; i < all.length; i++) { if (all[i].id === editingId) { rec = all[i]; break; } }
  if (!rec) return;
  
  var date = document.getElementById("edit-date").value;
  var store = document.getElementById("edit-store") ? document.getElementById("edit-store").value : rec.store;
  var note = document.getElementById("edit-note") ? document.getElementById("edit-note").value.trim() : "";
  
  if (rec.type === "income") {
    var cash = parseFloat(document.getElementById("edit-cash").value) || 0;
    var qr = parseFloat(document.getElementById("edit-qr").value) || 0;
    var wx = parseFloat(document.getElementById("edit-wx").value) || 0;
    var zfb = parseFloat(document.getElementById("edit-zfb").value) || 0;
    var cost = parseFloat(document.getElementById("edit-cost").value) || 0;
    var amount = cash + qr + wx + zfb;
    var cat = document.getElementById("edit-cat") ? document.getElementById("edit-cat").value : rec.cat;
    rec.date = date; rec.store = store; rec.name = document.getElementById("edit-name").value.trim() || "未命名";
    rec.cat = cat; rec.handler = document.getElementById("edit-handler") ? document.getElementById("edit-handler").value : rec.handler;
    rec.cash = cash; rec.qr = qr; rec.wx = wx; rec.zfb = zfb;
    rec.amount = amount; rec.cost = cost; rec.profit = Math.max(0, amount - cost);
    rec.commRate = getRate(cat); rec.note = note;
  } else if (rec.type === "expense") {
    var cash = parseFloat(document.getElementById("edit-cash").value) || 0;
    var qr = parseFloat(document.getElementById("edit-qr").value) || 0;
    var wx = parseFloat(document.getElementById("edit-wx").value) || 0;
    var zfb = parseFloat(document.getElementById("edit-zfb").value) || 0;
    var amount = cash + qr + wx + zfb;
    rec.date = date; rec.store = store; rec.name = document.getElementById("edit-name").value.trim() || "未命名";
    rec.cat = document.getElementById("edit-cat") ? document.getElementById("edit-cat").value : rec.cat;
    rec.handler = document.getElementById("edit-handler") ? document.getElementById("edit-handler").value : rec.handler;
    rec.cash = cash; rec.qr = qr; rec.wx = wx; rec.zfb = zfb;
    rec.amount = amount; rec.note = note;
  } else if (rec.type === "exchange") {
    rec.date = date; rec.store = store;
    rec.cash = parseFloat(document.getElementById("edit-cash").value) || 0;
    rec.qr = parseFloat(document.getElementById("edit-qr").value) || 0;
    rec.note = note;
  }
  
  saveData(data);
  document.getElementById("modal-edit").classList.remove("show");
  editingId = null;
  updateHandlerList();
  refreshAll();
  showToast("记录已更新 ✅");
}
function deleteRecord(id){if(!confirm('确定要删除这条记录吗？此操作不可恢复。'))return;var data=loadData();for(var k in data){data[k]=data[k].filter(function(r){return r.id!==id})}saveData(data);document.getElementById('modal-detail').classList.remove('show');refreshAll();showToast('已删除')}

function showSettings(){var s=loadSettings();var list=document.getElementById('settings-rate-list');list.innerHTML='';for(var i=0;i<INCOME_CATS().length;i++){var cat=INCOME_CATS()[i],rate=(s.rates&&s.rates[cat]!==undefined)?s.rates[cat]:(DEFAULT_RATES[cat]||10);list.innerHTML+='<div class="set-row"><span>'+cat+'</span><div><input type="number" value="'+rate+'" step="0.1" class="rate-input" data-cat="'+cat+'" style="width:70px;text-align:center" onchange="this.value=Math.max(0,Math.min(100,parseFloat(this.value)||0))"> %</div></div>'}document.getElementById('settings-pwd').value='';document.getElementById('modal-settings').classList.add('show')}

// ====== CSV IMPORT ======
function downloadCSVTemplate(){var header='类型,日期,店铺,名称,品类,经办人,现金,收款码,微信,支付宝,成本,备注\n';var ex=['收入,2024-01-15,东湖印象,售出山地车,整车,张三,1000,500,0,0,800,含配件','支出,2024-01-15,太古里,进货配件,进货,李四,0,0,200,0,,运费','收入,2024-01-16,新和县,维修服务,维修,王五,0,0,50,0,10,换胎'].join('\n');var csv=header+ex;var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='自行车店记账模板.csv';a.click();URL.revokeObjectURL(url);showToast('模板已下载')}
function importCSV(input){var file=input.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){var text=e.target.result;if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);var lines=text.split(/\r?\n/).filter(function(l){return l.trim()});if(lines.length<2){showToast('CSV文件为空或格式错误');return}var data=loadData();var count=0;for(var i=1;i<lines.length;i++){var cols=parseCSVLine(lines[i]);if(cols.length<4)continue;var type=cols[0].trim();var date=cols[1].trim();if(!date||!/\d{4}-\d{2}-\d{2}/.test(date))continue;if(type==='收入'){var cash=parseFloat(cols[6])||0,qr=parseFloat(cols[7])||0,wx=parseFloat(cols[8])||0,zfb=parseFloat(cols[9])||0;var amt=cash+qr+wx+zfb;var cost=parseFloat(cols[10])||0;var cat=cols[4]?cols[4].trim():'其他';if(INCOME_CATS().indexOf(cat)<0)cat='其他';data.income.push({id:Date.now()+count,type:'income',date:date,store:cols[2].trim()||'东湖印象',name:cols[3].trim()||'导入记录',cat:cat,handler:cols[5].trim()||'',cash:cash,qr:qr,wx:wx,zfb:zfb,amount:amt,cost:cost,profit:Math.max(0,amt-cost),commRate:getRate(cat),note:cols[11]?cols[11].trim():''});count++}else if(type==='支出'){var cash=parseFloat(cols[6])||0,qr=parseFloat(cols[7])||0,wx=parseFloat(cols[8])||0,zfb=parseFloat(cols[9])||0;var amt=cash+qr+wx+zfb;var cat=cols[4]?cols[4].trim():'其他';if(EXPENSE_CATS().indexOf(cat)<0)cat='其他';data.expense.push({id:Date.now()+count+1000000,type:'expense',date:date,store:cols[2].trim()||'东湖印象',name:cols[3].trim()||'导入记录',cat:cat,handler:cols[5].trim()||'',cash:cash,qr:qr,wx:wx,zfb:zfb,amount:amt,note:cols[11]?cols[11].trim():''});count++}}saveData(data);updateHandlerList();refreshAll();showToast('成功导入 '+count+' 条记录 ✅')};reader.readAsText(file,'UTF-8');input.value=''}
function parseCSVLine(line){var result=[];var current='';var inQuotes=false;for(var i=0;i<line.length;i++){var ch=line[i];if(inQuotes){if(ch==='"'){if(i+1<line.length&&line[i+1]==='"'){current+='"';i++}else inQuotes=false}else current+=ch}else{if(ch==='"')inQuotes=true;else if(ch===','){result.push(current);current=''}else current+=ch}}result.push(current);return result}

// ====== HANDLER LIST ======
function updateHandlerList(){var data=loadData();var handlers={};for(var i=0;i<data.income.length;i++){if(data.income[i].handler)handlers[data.income[i].handler]=true}for(var i=0;i<data.expense.length;i++){if(data.expense[i].handler)handlers[data.expense[i].handler]=true}var dict=loadDict();var dHandlers=dict.handlers||[];for(var i=0;i<dHandlers.length;i++)handlers[dHandlers[i]]=true;var names=[];for(var k in handlers)names.push(k);names.sort();var ids=['inc-handler','exp-handler'];for(var j=0;j<ids.length;j++){var sel=document.getElementById(ids[j]);if(sel){var cur=sel.value;sel.innerHTML='<option value="">-- 选择经办人 --</option>';for(var i=0;i<names.length;i++)sel.innerHTML+='<option value="'+esc(names[i])+'">'+esc(names[i])+'</option>';if(cur)sel.value=cur}}}

function sendNotify(type,rec){var name=rec.name||rec.cat||'';var amt=rec.amount||0;var msg='【自行车店】'+type+'通知\n店铺：'+(rec.store||'')+'\n项目：'+name+'\n金额：¥'+fmt(amt)+'\n时间：'+new Date().toLocaleString();try{fetch('/api/mailer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject:'自行车店记账 - '+type+' - '+name,body:msg.replace(/\n/g,'<br>')})}).catch(function(){})}catch(e){}}
