<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🍧 蜜雪合伙店记账本</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#10b981;--green-light:#d1fae5;--red:#ef4444;--red-light:#fee2e2;--bg:#f2f3f5;--card:#fff;--text:#1f2937;--sub:#6b7280;--border:#e5e7eb;--primary:#f59e0b;--orange:#f59e0b;--orange-light:#fef3c7}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:80px;font-size:14px}
header{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;padding:10px 16px;position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:17px;font-weight:600}
.header-btns{display:flex;gap:6px}
.header-btns button{background:rgba(255,255,255,.2);border:0;color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#f59e0b,#d97706);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.login-screen h2{font-size:26px;color:#fff;margin-bottom:8px}
.login-screen .subtitle{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:28px}
.login-card{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:350px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-card .title{font-size:16px;font-weight:600;text-align:center;margin-bottom:16px}
.login-card input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;text-align:center;margin-bottom:12px;font-family:inherit}
.login-card input:focus{outline:0;border-color:var(--primary)}
.login-card .btn{width:100%;margin-bottom:8px}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:8px}
.store-bar{background:#fff;padding:6px 12px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--border);position:sticky;top:44px;z-index:49;scrollbar-width:none}
.store-bar::-webkit-scrollbar{display:none}
.store-tag{padding:5px 14px;border:1px solid var(--border);border-radius:16px;font-size:13px;background:#fff;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.store-tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:82px;z-index:48;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1 0 auto;min-width:fit-content;padding:10px 6px;border:0;background:none;font-size:13px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.page{display:none;padding:10px 14px}
.page.active{display:block}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.form-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.form-row>*{flex:1;min-width:0}
label{display:block;font-size:12px;color:var(--sub);margin-bottom:3px}
input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--card);-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px rgba(245,158,11,.1)}
textarea{resize:vertical;min-height:50px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:10px 16px;border:0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-block{width:100%}
.btn-ghost{background:none;color:var(--red);padding:6px 10px;font-size:12px}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-outline{background:var(--card);border:1px solid var(--border)}
.record-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);gap:8px;cursor:pointer}
.record-item:last-child{border-bottom:0}
.record-info{flex:1;min-width:0}
.record-info .name{font-size:14px;font-weight:600}
.record-info .meta{font-size:11px;color:var(--sub);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px}
.record-info .meta span{white-space:nowrap}
.record-amount{font-size:18px;font-weight:700;text-align:right;white-space:nowrap;min-width:70px}
.record-amount.income{color:var(--green)}
.record-amount.expense{color:var(--red)}
.record-amount.exchange{color:var(--orange)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.summary-item{background:var(--bg);border-radius:10px;padding:14px;text-align:center}
.summary-item .label{font-size:12px;color:var(--sub)}
.summary-item .value{font-size:22px;font-weight:700;margin-top:4px}
.filter-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-tag{padding:5px 14px;border:1px solid var(--border);border-radius:14px;font-size:12px;background:var(--card);cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0}
.filter-tag.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.chart-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.chart-row .lbl{font-size:12px;min-width:50px;text-align:right}
.chart-row .bar-wrap{flex:1;height:20px;background:var(--bg);border-radius:10px;overflow:hidden}
.chart-row .bar{height:100%;border-radius:10px;min-width:4px}
.chart-row .bar.green{background:linear-gradient(90deg,#10b981,#34d399)}
.chart-row .bar.red{background:linear-gradient(90deg,#ef4444,#f87171)}
.chart-row .amt{font-size:11px;white-space:nowrap;color:var(--sub)}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-radius:10px;margin-bottom:6px}
.total-bar .label{font-size:14px;font-weight:600}
.total-bar .value{font-size:16px;font-weight:700}
.salary-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.salary-row:last-child{border-bottom:0}
.salary-row .sname{font-weight:600;min-width:50px;font-size:13px}
.salary-row .sval{font-size:13px;white-space:nowrap}
.section-title{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:8px}
.empty-state{text-align:center;padding:30px;color:var(--sub);font-size:14px}
.empty-state .icon{font-size:36px;margin-bottom:8px;display:block}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:18px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;margin:20px}
.modal h3{font-size:16px;margin-bottom:14px;text-align:center}
.modal .btn-row{display:flex;gap:8px;margin-top:14px}
.modal .btn-row button{flex:1}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:0}
.set-row span{font-size:14px;font-weight:500}
.set-row input{width:70px;text-align:center;padding:6px;display:inline}
.pay-summary{background:var(--green-light);padding:10px 12px;border-radius:8px;margin-top:8px;font-size:14px;font-weight:600;color:var(--green);text-align:center}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.detail-modal{background:var(--card);border-radius:16px;padding:20px;max-width:400px;width:90%}
.detail-modal .line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}
.detail-modal .line:last-child{border-bottom:0}
.detail-modal .line .val{font-weight:600}
.date-divider{text-align:center;font-size:11px;color:var(--sub);padding:12px 0 6px;font-weight:500}
@media(min-width:768px){body{max-width:500px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}header{position:relative}}</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen">
  <h2>🍧 蜜雪合伙店记账本</h2>
  <p class="subtitle">蜜雪冰城 · KZT/CNY/USD · 股东分红</p>
  <div class="login-card">
    <div class="title">选择登录方式</div>
    <input type="password" id="login-pwd" placeholder="管理员密码">
    <button class="btn btn-primary btn-block" onclick="doLogin('admin')">🔐 管理员登录</button>
    <button class="btn btn-outline btn-block" onclick="doLogin('staff')">👤 员工记账</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<header id="main-header" style="display:none">
  <h1>🍧 蜜雪合伙店记账本</h1>
  <div class="header-btns">
    <button onclick="showSettings()" id="btn-settings" style="display:none">⚙️</button>
    <button onclick="logout()">退出</button>
  </div>
</header>

<div id="tab-bar" class="tab-bar" style="display:none">
  <button class="tab-btn active" onclick="switchTab('income')">📥 收入</button>
  <button class="tab-btn" onclick="switchTab('expense')">📤 支出</button>
  <button class="tab-btn" onclick="switchTab('exchange')">💱 换汇</button>
  <button class="tab-btn" onclick="switchTab('shareholder')">👥 股东</button>
  <button class="tab-btn admin-only" onclick="switchTab('salary')">💰 工资</button>
  <button class="tab-btn admin-only" onclick="switchTab('summary')">📊 汇总</button>
  <button class="tab-btn admin-only" onclick="switchTab('analysis')">📈 分析</button>
  <button class="tab-btn admin-only" onclick="switchTab('accounts')">🏦 账户</button>
  <button class="tab-btn admin-only" onclick="switchTab('dict')">📖 字典</button>
</div>

<div id="page-income" class="page active">
  <div class="card">
    <h3>📥 记一笔收入</h3>
    <div class="form-row"><div><label>日期</label><input type="date" id="inc-date"></div><div><label>币种</label><select id="inc-currency" onchange="updateIncAccount()"><option value="KZT">KZT (₸)</option><option value="CNY">CNY (¥)</option><option value="USD">USD ($)</option></select></div></div>
    <div class="form-row"><div><label>账户</label><select id="inc-account"></select></div><div><label>品类</label><select id="inc-cat"><option value="销售收入">销售收入</option><option value="其他收入">其他收入</option></select></div></div>
    <div class="form-row"><div><label>经办人</label><input type="text" id="inc-handler" list="handler-list" placeholder="输入或选择经办人"></div><div><label>成本</label><input type="number" id="inc-cost" placeholder="0" step="0.01" value="0"></div></div>
    <div class="form-row"><div><label>金额</label><input type="number" id="inc-amount" placeholder="0" step="0.01"></div><div><label>备注</label><input type="text" id="inc-note" placeholder="选填"></div></div>
    <button class="btn btn-green btn-block" onclick="saveIncome()" style="margin-top:6px">✅ 记一笔收入</button>
  </div>
  <div id="income-list"></div>
</div>

<div id="page-expense" class="page">
  <div class="card">
    <h3>📤 记一笔支出</h3>
    <div class="form-row"><div><label>日期</label><input type="date" id="exp-date"></div><div><label>币种</label><select id="exp-currency" onchange="updateExpAccount()"><option value="KZT">KZT (₸)</option><option value="CNY">CNY (¥)</option><option value="USD">USD ($)</option></select></div></div>
    <div class="form-row"><div><label>账户</label><select id="exp-account"></select></div><div><label>品类</label><select id="exp-cat"><option value="进货">进货</option><option value="房租">房租</option><option value="水电">水电</option><option value="工资">工资</option><option value="运费">运费</option><option value="广告">广告</option><option value="维修">维修</option><option value="其他">其他</option></select></div></div>
    <div class="form-row"><div><label>经办人</label><input type="text" id="exp-handler" list="handler-list" placeholder="输入或选择经办人"></div><div><label>金额</label><input type="number" id="exp-amount" placeholder="0" step="0.01"></div></div>
    <div class="form-row"><div><label>备注</label><input type="text" id="exp-note" placeholder="选填"></div></div>
    <button class="btn btn-red btn-block" onclick="saveExpense()" style="margin-top:6px">✅ 记一笔支出</button>
  </div>
  <div id="expense-list"></div>
</div>

<div id="page-exchange" class="page">
  <div class="card">
    <h3>💱 换汇</h3>
    <div class="form-row"><div><label>日期</label><input type="date" id="exc-date"></div><div><label>类型</label><select id="exc-type" onchange="updateExForm()"><option value="exchange">换汇</option><option value="withdraw">取现</option><option value="deposit">存钱</option></select></div></div>
    <div class="form-row" id="exc-from-group"><div><label>换出账户</label><select id="exc-from-acct"></select></div><div><label>换出金额</label><input type="number" id="exc-from-amt" placeholder="0" step="0.01"></div></div>
    <div class="form-row" id="exc-to-group"><div><label>收到账户</label><select id="exc-to-acct"></select></div><div><label>收到金额</label><input type="number" id="exc-to-amt" placeholder="0" step="0.01"></div></div>
    <div class="form-row"><div><label>备注</label><input type="text" id="exc-note" placeholder="说明"></div></div>
    <button class="btn btn-orange btn-block" onclick="saveExchange()" style="margin-top:6px">✅ 记录</button>
  </div>
  <div id="exchange-list"></div>
</div>

<div id="page-shareholder" class="page">
  <div class="card">
    <h3>👥 股东出资</h3>
    <div class="form-row"><div><label>日期</label><input type="date" id="sh-date"></div><div><label>币种</label><select id="sh-currency" onchange="updateShAccount()"><option value="KZT">KZT</option><option value="CNY">CNY</option><option value="USD">USD</option></select></div></div>
    <div class="form-row"><div><label>股东姓名</label><input type="text" id="sh-name" placeholder="股东姓名"></div><div><label>账户</label><select id="sh-account"></select></div></div>
    <div class="form-row"><div><label>出资金额</label><input type="number" id="sh-amount" placeholder="0" step="0.01"></div><div><label>备注</label><input type="text" id="sh-note" placeholder="选填"></div></div>
    <button class="btn btn-primary btn-block" onclick="saveShareholder()" style="margin-top:6px">✅ 记录出资</button>
  </div>
  <div class="card" id="shareholder-summary"></div>
  <div id="shareholder-list"></div>
</div>

<div id="page-salary" class="page">
  <div class="card">
    <h3>💰 工资计算</h3>
    <div class="form-row"><div><label>选择月份</label><input type="month" id="salary-month" onchange="renderSalary()"></div></div>
    <div id="salary-content"></div>
  </div>
</div>

<div id="page-summary" class="page">
  <div id="summary-content"></div>
</div>

<div id="page-analysis" class="page">
  <div id="analysis-content"></div>
</div>

<div id="page-accounts" class="page">
  <div id="accounts-content"></div>
</div>


<div id="page-dict" class="page">
  <div class="card">
    <h3>📖 字典设置</h3>
    <div class="form-row"><div><label>选择字典</label><select id="mx-dict-type" onchange="renderMxDict()"><option value="accounts">账户</option><option value="income_cats">收入品类</option><option value="expense_cats">支出品类</option><option value="handlers">经办人</option></select></div></div>
    <div id="mx-dict-form" style="margin-bottom:8px">
      <div class="form-row">
        <div><input type="text" id="mx-dict-name" placeholder="账户名称"></div>
        <div><select id="mx-dict-cur"><option value="KZT">KZT</option><option value="CNY">CNY</option><option value="USD">USD</option></select></div>
        <div style="flex:0 0 auto"><button class="btn btn-green btn-sm" onclick="addMxDictItem()" style="margin-top:17px">+ 添加</button></div>
      </div>
    </div>
    <div id="mx-dict-simple-form" style="margin-bottom:8px;display:none">
      <div class="form-row"><div><input type="text" id="mx-dict-simple-val" placeholder="输入新项"></div><div style="flex:0 0 auto"><button class="btn btn-green btn-sm" onclick="addMxDictSimple()" style="margin-top:17px">+ 添加</button></div></div>
    </div>
    <div id="mx-dict-item-list"></div>
  </div>
</div>
<div id="modal-settings" class="modal-overlay">
  <div class="modal">
    <h3>⚙️ 设置</h3>
    <div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:8px">提成比例 (%)</div><input type="number" id="settings-comm" value="5" step="0.1" style="width:100px"> %</div>
    <div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:8px">管理员密码</div><input type="text" id="settings-pwd" placeholder="新密码（留空不修改）"></div>
    <div style="margin-bottom:14px"><div style="font-weight:600;margin-bottom:8px">📋 CSV 模板导入</div><button class="btn btn-outline btn-block" onclick="downloadCSVTemplate()" style="margin-bottom:6px">📥 下载模板</button><input type="file" id="csv-file-input" accept=".csv" style="display:none" onchange="importCSV(this)"><button class="btn btn-primary btn-block" onclick="document.getElementById('csv-file-input').click()">📤 导入CSV数据</button></div>
    <div class="btn-row"><button class="btn btn-outline" onclick="document.getElementById('modal-settings').classList.remove('show')">取消</button><button class="btn btn-primary" onclick="saveSettings()">保存设置</button></div>
  </div>
</div>

<div id="modal-detail" class="modal-overlay">
  <div class="detail-modal" id="detail-content"></div>
</div>

<div id="toast" class="toast"></div>
<datalist id="handler-list"></datalist>

<script>
// Populate account dropdowns
function populateAccounts(cur){var map={KZT:["现金KZT","Kaspi店铺","银行KZT","Wolt/Glovo待结算"],CNY:["现金CNY","微信/支付宝CNY"],USD:["USD现金"]};var accts=map[cur]||[];var h="";for(var i=0;i<accts.length;i++)h+='<option value="'+accts[i]+'">'+accts[i]+'</option>';return h}
function updateIncAccount(){var cur=document.getElementById("inc-currency").value;document.getElementById("inc-account").innerHTML=populateAccounts(cur)}
function updateExpAccount(){var cur=document.getElementById("exp-currency").value;document.getElementById("exp-account").innerHTML=populateAccounts(cur)}
function updateShAccount(){var cur=document.getElementById("sh-currency").value;document.getElementById("sh-account").innerHTML=populateAccounts(cur)}
(function(){var all="";for(var i=0;i<["KZT","CNY","USD"].length;i++)all+=populateAccounts(["KZT","CNY","USD"][i]);document.getElementById("exc-from-acct").innerHTML=all;document.getElementById("exc-to-acct").innerHTML=all})();
updateIncAccount();updateExpAccount();updateShAccount();updateExForm();
</script>
<script>

// ====== DATA MODEL ======
var CURRENCIES = ['KZT','CNY','USD'];
var CUR_SYMBOLS = {KZT:'₸',CNY:'¥',USD:'$'};
var MX_DICT_DEFAULTS = {
  accounts: [{name:'现金KZT',cur:'KZT'},{name:'Kaspi店铺',cur:'KZT'},{name:'银行KZT',cur:'KZT'},{name:'Wolt/Glovo待结算',cur:'KZT'},{name:'现金CNY',cur:'CNY'},{name:'微信/支付宝CNY',cur:'CNY'},{name:'USD现金',cur:'USD'}],
  income_cats: ['销售收入','其他收入'],
  expense_cats: ['进货','房租','水电','工资','运费','广告','维修','其他'],
  handlers: []
};
function loadMxDict() { try { return JSON.parse(localStorage.getItem('mx_dict')) || JSON.parse(JSON.stringify(MX_DICT_DEFAULTS)); } catch(e) { return JSON.parse(JSON.stringify(MX_DICT_DEFAULTS)); } }
function saveMxDict(d) { localStorage.setItem('mx_dict', JSON.stringify(d)); }
function ACCOUNTS() { var d=loadMxDict(); return d.accounts.map(function(a){return a.name}); }
function ACCT_CUR() { var d=loadMxDict(); var m={}; for(var i=0;i<d.accounts.length;i++) m[d.accounts[i].name]=d.accounts[i].cur; return m; }
function INCOME_CATS_MX() { return loadMxDict().income_cats; }
function EXPENSE_CATS_MX() { return loadMxDict().expense_cats; }
function HANDLERS_MX() { return loadMxDict().handlers || []; }
var EXCHANGE_TYPES = ['换汇','取现','存钱'];
var ADMIN_PWD = 'admin888';
var COMM_RATE = 5; // default commission %
var userRole = null;
var currentTab = 'income';

function fmt(n){return Number(n||0).toFixed(2)}
function fmtCur(n,cur){var s=CUR_SYMBOLS[cur]||'';return s+fmt(n)}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getMonth(d){return d?d.slice(0,7):''}

// ====== STORAGE ======
function loadD(){try{return JSON.parse(localStorage.getItem('mx_ledger'))||{income:[],expense:[],exchange:[],shareholder:[]}}catch(e){return{income:[],expense:[],exchange:[],shareholder:[]}}}
function saveD(d){localStorage.setItem('mx_ledger',JSON.stringify(d))}
function loadS(){try{return JSON.parse(localStorage.getItem('mx_settings'))||{pwd:ADMIN_PWD,commRate:COMM_RATE}}catch(e){return{pwd:ADMIN_PWD,commRate:COMM_RATE}}}
function saveS(s){localStorage.setItem('mx_settings',JSON.stringify(s))}
function loadSC(){try{return JSON.parse(localStorage.getItem('mx_salary'))||{}}catch(e){return{}}}
function saveSC(sc){localStorage.setItem('mx_salary',JSON.stringify(sc))}
function staffFilter(records){if(userRole!=='staff')return records;var twoD=Date.now()-2*24*60*60*1000;return records.filter(function(r){return new Date(r.date).getTime()>=twoD})}

// ====== LOGIN ======
function doLogin(role){var pwd=document.getElementById('login-pwd').value.trim();var errEl=document.getElementById('login-error');if(role==='admin'){var s=loadS();var cp=s.pwd||ADMIN_PWD;if(pwd!==cp){errEl.textContent='密码错误';errEl.style.display='block';return}}userRole=role;document.getElementById('login-screen').style.display='none';document.getElementById('main-header').style.display='flex';document.getElementById('tab-bar').style.display='flex';if(userRole==='admin'){document.getElementById('btn-settings').style.display='';var at=document.querySelectorAll('.admin-only');for(var i=0;i<at.length;i++)at[i].style.display=''}document.getElementById('inc-date').value=new Date().toISOString().slice(0,10);document.getElementById('exp-date').value=new Date().toISOString().slice(0,10);document.getElementById('exc-date').value=new Date().toISOString().slice(0,10);document.getElementById('sh-date').value=new Date().toISOString().slice(0,10);document.getElementById('salary-month').value=new Date().toISOString().slice(0,7);rebuildMxSelects();refreshAll()}

function renderMxDict(){var type=document.getElementById('mx-dict-type').value;var dict=loadMxDict();var items=dict[type]||[];var labels={accounts:'账户',income_cats:'收入品类',expense_cats:'支出品类',handlers:'经办人'};var isAcct=type==='accounts';document.getElementById('mx-dict-form').style.display=isAcct?'':'none';document.getElementById('mx-dict-simple-form').style.display=isAcct?'none':'';var h='<div style="font-weight:600;margin-bottom:6px">当前'+(labels[type]||type)+'列表</div>';if(items.length===0)h+='<div class="empty-state" style="padding:15px">暂无项目</div>';else for(var i=0;i<items.length;i++){if(isAcct){h+='<div class="total-bar"><span class="label">'+esc(items[i].name)+' ('+esc(items[i].cur)+')</span><button class="btn btn-ghost" onclick="deleteMxDictItem('+i+')">✕</button></div>'}else{h+='<div class="total-bar"><span class="label">'+esc(items[i])+'</span><button class="btn btn-ghost" onclick="deleteMxDictItem('+i+')">✕</button></div>'}}document.getElementById('mx-dict-item-list').innerHTML=h}
function addMxDictItem(){var type=document.getElementById('mx-dict-type').value;var name=document.getElementById('mx-dict-name').value.trim();var cur=document.getElementById('mx-dict-cur').value;if(!name){showToast('请输入名称');return}var dict=loadMxDict();for(var i=0;i<dict.accounts.length;i++){if(dict.accounts[i].name===name){showToast('已存在');return}}dict.accounts.push({name:name,cur:cur});saveMxDict(dict);document.getElementById('mx-dict-name').value='';renderMxDict();rebuildMxSelects();showToast('已添加')}
function addMxDictSimple(){var type=document.getElementById('mx-dict-type').value;var val=document.getElementById('mx-dict-simple-val').value.trim();if(!val){showToast('请输入内容');return}var dict=loadMxDict();if(dict[type].indexOf(val)>=0){showToast('已存在');return}dict[type].push(val);saveMxDict(dict);document.getElementById('mx-dict-simple-val').value='';renderMxDict();rebuildMxSelects();showToast('已添加')}
function deleteMxDictItem(idx){var type=document.getElementById('mx-dict-type').value;var dict=loadMxDict();dict[type].splice(idx,1);saveMxDict(dict);renderMxDict();rebuildMxSelects();showToast('已删除')}
function rebuildMxSelects(){var dict=loadMxDict();var incCats=dict.income_cats;var sel=document.getElementById('inc-cat');if(sel){sel.innerHTML='';for(var i=0;i<incCats.length;i++)sel.innerHTML+='<option value="'+esc(incCats[i])+'">'+esc(incCats[i])+'</option>'}var expCats=dict.expense_cats;sel=document.getElementById('exp-cat');if(sel){sel.innerHTML='';for(var i=0;i<expCats.length;i++)sel.innerHTML+='<option value="'+esc(expCats[i])+'">'+esc(expCats[i])+'</option>'}updateMxAccounts();if(typeof updateHandlerList==='function')updateHandlerList()}
function updateMxAccounts(){var dict=loadMxDict();var accts=dict.accounts;var sel=document.getElementById('inc-account');if(sel){sel.innerHTML='';for(var i=0;i<accts.length;i++)sel.innerHTML+='<option value="'+esc(accts[i].name)+'">'+esc(accts[i].name)+'</option>'}sel=document.getElementById('exp-account');if(sel){sel.innerHTML='';for(var i=0;i<accts.length;i++)sel.innerHTML+='<option value="'+esc(accts[i].name)+'">'+esc(accts[i].name)+'</option>'}sel=document.getElementById('sh-account');if(sel){sel.innerHTML='';for(var i=0;i<accts.length;i++)sel.innerHTML+='<option value="'+esc(accts[i].name)+'">'+esc(accts[i].name)+'</option>'}var all='';for(var i=0;i<accts.length;i++)all+='<option value="'+esc(accts[i].name)+'">'+esc(accts[i].name)+'</option>';sel=document.getElementById('exc-from-acct');if(sel)sel.innerHTML=all;sel=document.getElementById('exc-to-acct');if(sel)sel.innerHTML=all}
function saveIncome(){var d=loadD();var amt=parseFloat(document.getElementById('inc-amount').value)||0;if(amt<=0){showToast('请输入金额');return}var rec={id:Date.now(),type:'income',date:document.getElementById('inc-date').value,currency:document.getElementById('inc-currency').value,account:document.getElementById('inc-account').value,cat:document.getElementById('inc-cat').value,handler:document.getElementById('inc-handler').value.trim(),amount:amt,cost:parseFloat(document.getElementById('inc-cost').value)||0,profit:Math.max(0,amt-(parseFloat(document.getElementById('inc-cost').value)||0)),note:document.getElementById('inc-note').value.trim()};d.income.push(rec);saveD(d);document.getElementById('inc-amount').value='';document.getElementById('inc-cost').value='0';document.getElementById('inc-note').value='';updateHandlerList();renderIncome();showToast('收入记录成功 ✅');sendNotify('收入',rec)}
function renderIncome(){var d=loadD();var records=staffFilter(d.income);records.sort(function(a,b){return b.id-a.id});var h='';var ld='';for(var i=0;i<records.length;i++){var r=records[i];var dl=r.date;if(dl!==ld){h+='<div class="date-divider">—— '+dl+' ——</div>';ld=dl}h+='<div class="record-item" onclick="showDetail('+r.id+')"><div class="record-info"><div class="name">'+esc(r.cat||'')+'</div><div class="meta">';if(r.account)h+='<span>🏦'+esc(r.account)+'</span>';if(r.handler)h+='<span>👤'+esc(r.handler)+'</span>';if(r.cost>0)h+='<span>成本'+fmtCur(r.cost,r.currency)+'</span>';h+='</div></div><div class="record-amount income">'+fmtCur(r.amount,r.currency)+'</div></div>'}if(!h)h='<div class="empty-state"><span class="icon">📥</span>暂无收入记录</div>';document.getElementById('income-list').innerHTML=h}

function saveExpense(){var d=loadD();var amt=parseFloat(document.getElementById('exp-amount').value)||0;if(amt<=0){showToast('请输入金额');return}var rec={id:Date.now(),type:'expense',date:document.getElementById('exp-date').value,currency:document.getElementById('exp-currency').value,account:document.getElementById('exp-account').value,cat:document.getElementById('exp-cat').value,handler:document.getElementById('exp-handler').value.trim(),amount:amt,note:document.getElementById('exp-note').value.trim()};d.expense.push(rec);saveD(d);document.getElementById('exp-amount').value='';document.getElementById('exp-note').value='';updateHandlerList();renderExpense();showToast('支出记录成功 ✅');sendNotify('支出',rec)}
function renderExpense(){var d=loadD();var records=staffFilter(d.expense);records.sort(function(a,b){return b.id-a.id});var h='';var ld='';for(var i=0;i<records.length;i++){var r=records[i];var dl=r.date;if(dl!==ld){h+='<div class="date-divider">—— '+dl+' ——</div>';ld=dl}h+='<div class="record-item" onclick="showDetail('+r.id+')"><div class="record-info"><div class="name">'+esc(r.cat||'')+'</div><div class="meta">';if(r.account)h+='<span>🏦'+esc(r.account)+'</span>';if(r.handler)h+='<span>👤'+esc(r.handler)+'</span>';h+='</div></div><div class="record-amount expense">'+fmtCur(r.amount,r.currency)+'</div></div>'}if(!h)h='<div class="empty-state"><span class="icon">📤</span>暂无支出记录</div>';document.getElementById('expense-list').innerHTML=h}

// ====== EXCHANGE ======
function updateExForm(){var t=document.getElementById('exc-type').value;document.getElementById('exc-from-group').style.display=(t==='exchange'||t==='withdraw')?'':'none';document.getElementById('exc-to-group').style.display=(t==='exchange'||t==='deposit')?'':'none'}
function saveExchange(){var d=loadD();var t=document.getElementById('exc-type').value;var famt=parseFloat(document.getElementById('exc-from-amt').value)||0;var tamt=parseFloat(document.getElementById('exc-to-amt').value)||0;var rec={id:Date.now(),type:'exchange',exType:t,date:document.getElementById('exc-date').value,note:document.getElementById('exc-note').value.trim()};if(t==='exchange'){rec.fromAccount=document.getElementById('exc-from-acct').value;rec.fromCur=ACCT_CUR()[rec.fromAccount]||'KZT';rec.fromAmt=famt;rec.toAccount=document.getElementById('exc-to-acct').value;rec.toCur=ACCT_CUR()[rec.toAccount]||'KZT';rec.toAmt=tamt;if(rec.fromAccount===rec.toAccount){showToast('换出和收到账户不能相同');return}}else if(t==='withdraw'){rec.fromAccount=document.getElementById('exc-from-acct').value;rec.currency=ACCT_CUR()[rec.fromAccount]||'KZT';rec.amount=famt;rec.fromAmt=famt}else if(t==='deposit'){rec.toAccount=document.getElementById('exc-to-acct').value;rec.currency=ACCT_CUR()[rec.toAccount]||'KZT';rec.amount=tamt;rec.toAmt=tamt}if(famt===0&&tamt===0){showToast('请输入金额');return}d.exchange.push(rec);saveD(d);document.getElementById('exc-from-amt').value='';document.getElementById('exc-to-amt').value='';document.getElementById('exc-note').value='';renderExchange();showToast('记录成功 ✅')}
function renderExchange(){var d=loadD();var records=staffFilter(d.exchange);records.sort(function(a,b){return b.id-a.id});var h='';var ld='';for(var i=0;i<records.length;i++){var r=records[i];var dl=r.date;if(dl!==ld){h+='<div class="date-divider">—— '+dl+' ——</div>';ld=dl}var desc=r.exType==='exchange'?('换汇:'+r.fromAccount+'→'+r.toAccount):r.exType==='withdraw'?('取现:'+r.fromAccount):('存钱:'+(r.toAccount||''));h+='<div class="record-item" onclick="showDetail('+r.id+')"><div class="record-info"><div class="name">💱 '+esc(desc)+'</div><div class="meta">';if(r.fromAmt)h+='<span>出:'+fmtCur(r.fromAmt,r.fromCur||'KZT')+'</span>';if(r.toAmt)h+='<span>入:'+fmtCur(r.toAmt,r.toCur||'KZT')+'</span>';if(r.note)h+='<span>💬'+esc(r.note)+'</span>';h+='</div></div><div class="record-amount exchange">'+(r.fromAmt?fmtCur(r.fromAmt,r.fromCur||'KZT'):'')+(r.toAmt?' → '+fmtCur(r.toAmt,r.toCur||'KZT'):'')+'</div></div>'}if(!h)h='<div class="empty-state"><span class="icon">💱</span>暂无换汇记录</div>';document.getElementById('exchange-list').innerHTML=h}

// ====== SHAREHOLDER ======
function saveShareholder(){var d=loadD();var amt=parseFloat(document.getElementById('sh-amount').value)||0;if(amt<=0){showToast('请输入金额');return}var rec={id:Date.now(),type:'shareholder',date:document.getElementById('sh-date').value,name:document.getElementById('sh-name').value.trim()||'股东',currency:document.getElementById('sh-currency').value,account:document.getElementById('sh-account').value,amount:amt,note:document.getElementById('sh-note').value.trim()};d.shareholder.push(rec);saveD(d);document.getElementById('sh-amount').value='';document.getElementById('sh-note').value='';renderShareholder();showToast('出资记录成功 ✅');sendNotify('股东出资',rec)}
function renderShareholder(){var d=loadD();var records=staffFilter(d.shareholder);records.sort(function(a,b){return b.id-a.id});var h='';var ld='';for(var i=0;i<records.length;i++){var r=records[i];var dl=r.date;if(dl!==ld){h+='<div class="date-divider">—— '+dl+' ——</div>';ld=dl}h+='<div class="record-item" onclick="showDetail('+r.id+')"><div class="record-info"><div class="name">👤 '+esc(r.name||'股东')+'</div><div class="meta">';if(r.account)h+='<span>🏦'+esc(r.account)+'</span>';if(r.note)h+='<span>💬'+esc(r.note)+'</span>';h+='</div></div><div class="record-amount shareholder">'+fmtCur(r.amount,r.currency)+'</div></div>'}if(!h)h='<div class="empty-state"><span class="icon">👥</span>暂无股东记录</div>';document.getElementById('shareholder-list').innerHTML=h;if(userRole==='admin')renderShareholderSummary()}
function renderShareholderSummary(){var d=loadD();var sh=d.shareholder;var byName={};for(var i=0;i<sh.length;i++){var r=sh[i];if(!byName[r.name])byName[r.name]={totalByCur:{}};byName[r.name].totalByCur[r.currency]=(byName[r.name].totalByCur[r.currency]||0)+(r.amount||0)}var h='<h3>👥 股东出资汇总</h3>';var names=[];for(var k in byName)names.push(k);names.sort();for(var i=0;i<names.length;i++){var n=names[i];var b=byName[n];h+='<div class="total-bar"><span class="label">'+esc(n)+'</span><span class="value">';var curParts=[];for(var c in b.totalByCur){curParts.push(fmtCur(b.totalByCur[c],c))}h+=curParts.join(' + ')+'</span></div>'}if(names.length===0)h+='<div class="empty-state">暂无股东数据</div>';document.getElementById('shareholder-summary').innerHTML=h}

// ====== SUMMARY ======
function renderSummary(){if(userRole!=='admin')return;var d=loadD();var inc=d.income,exp=d.expense,sh=d.shareholder;var totalInc={},totalExp={},totalSh={};for(var i=0;i<inc.length;i++){var c=inc[i].currency;totalInc[c]=(totalInc[c]||0)+(inc[i].amount||0)}for(var i=0;i<exp.length;i++){var c=exp[i].currency;totalExp[c]=(totalExp[c]||0)+(exp[i].amount||0)}for(var i=0;i<sh.length;i++){var c=sh[i].currency;totalSh[c]=(totalSh[c]||0)+(sh[i].amount||0)}var h='<div class="summary-grid">';for(var i=0;i<CURRENCIES.length;i++){var cur=CURRENCIES[i];var incAmt=totalInc[cur]||0,expAmt=totalExp[cur]||0,shAmt=totalSh[cur]||0;h+='<div class="summary-item"><div class="label">收入('+cur+')</div><div class="value green">'+fmtCur(incAmt,cur)+'</div></div>';h+='<div class="summary-item"><div class="label">支出('+cur+')</div><div class="value red">'+fmtCur(expAmt,cur)+'</div></div>'}h+='</div>';h+='<div class="card" style="margin-top:10px"><h3>👥 股东出资总额</h3>';for(var c in totalSh){h+='<div class="total-bar"><span class="label">出资('+c+')</span><span class="value" style="color:var(--primary)">'+fmtCur(totalSh[c],c)+'</span></div>'}h+='</div>';document.getElementById('summary-content').innerHTML=h}

// ====== ANALYSIS ======
function renderAnalysis(){if(userRole!=='admin')return;var d=loadD();var inc=d.income,exp=d.expense;var ic={},ec={};for(var i=0;i<inc.length;i++){var c=inc[i].cat;ic[c]=(ic[c]||0)+inc[i].amount}for(var i=0;i<exp.length;i++){var c=exp[i].cat;ec[c]=(ec[c]||0)+exp[i].amount}var h='<div class="card"><h3>📊 收入品类分布</h3>';var icArr=[];for(var k in ic)icArr.push([k,ic[k]]);icArr.sort(function(a,b){return b[1]-a[1]});var mx=icArr.length>0?icArr[0][1]:1;for(var i=0;i<icArr.length;i++){h+='<div class="chart-row"><span class="lbl">'+icArr[i][0]+'</span><div class="bar-wrap"><div class="bar green" style="width:'+(icArr[i][1]/mx*100)+'%"></div></div><span class="amt">'+fmt(icArr[i][1])+'</span></div>'}if(icArr.length===0)h+='<div class="empty-state">暂无数据</div>';h+='</div>';h+='<div class="card"><h3>📊 支出品类分布</h3>';var ecArr=[];for(var k in ec)ecArr.push([k,ec[k]]);ecArr.sort(function(a,b){return b[1]-a[1]});var mxe=ecArr.length>0?ecArr[0][1]:1;for(var i=0;i<ecArr.length;i++){h+='<div class="chart-row"><span class="lbl">'+ecArr[i][0]+'</span><div class="bar-wrap"><div class="bar red" style="width:'+(ecArr[i][1]/mxe*100)+'%"></div></div><span class="amt">'+fmt(ecArr[i][1])+'</span></div>'}if(ecArr.length===0)h+='<div class="empty-state">暂无数据</div>';h+='</div>';document.getElementById('analysis-content').innerHTML=h}

// ====== SALARY ======
function renderSalary(){if(userRole!=='admin')return;var d=loadD();var sc=loadSC();var me=document.getElementById('salary-month');var month=me?me.value:'';var inc=d.income;if(month)inc=inc.filter(function(r){return getMonth(r.date)===month});var cm={};for(var i=0;i<inc.length;i++){var r=inc[i];if(r.handler){cm[r.handler]=(cm[r.handler]||0)+Math.max(0,(r.amount||0)-(r.cost||0))*(loadS().commRate||COMM_RATE)/100}}var nm={};for(var i=0;i<d.income.length;i++){if(d.income[i].handler)nm[d.income[i].handler]=true}for(var k in sc)nm[k]=true;var names=[];for(var k in nm)names.push(k);names.sort();if(!me.value)me.value=new Date().toISOString().slice(0,7);var h='<div class="card"><h3>💵 工资计算 ('+(month||'全部')+') | 提成率 '+(loadS().commRate||COMM_RATE)+'%</h3>';var tp=0;if(names.length===0)h+='<div class="empty-state">暂无经办人数据</div>';else for(var i=0;i<names.length;i++){var n=names[i],cfg=sc[n]||{base:0,deduction:0},com=cm[n]||0,sal=cfg.base+com-cfg.deduction;tp+=sal;h+='<div class="salary-row"><span class="sname">'+esc(n)+'</span>';h+='<span style="font-size:11px">底薪</span><input type="number" value="'+cfg.base+'" style="width:60px;text-align:center;padding:3px" onchange="var r=this.closest(\'.salary-row\');var nm=r.querySelector(\'.sname\').textContent;updateBase(nm,this.value)">';h+='<span class="sval" style="color:var(--green);font-size:12px">提成 '+fmtCur(com,'KZT')+'</span>';h+='<span style="font-size:11px">扣除</span><input type="number" value="'+cfg.deduction+'" style="width:60px;text-align:center;padding:3px;color:var(--red)" onchange="var r=this.closest(\'.salary-row\');var nm=r.querySelector(\'.sname\').textContent;updateDed(nm,this.value)">';h+='<span class="sval" style="font-weight:700">实发 '+fmtCur(sal,'KZT')+'</span></div>'}h+='<div class="total-bar" style="margin-top:10px"><span class="label">合计实发</span><span class="value" style="color:var(--primary)">'+fmtCur(tp,'KZT')+'</span></div></div>';document.getElementById('salary-content').innerHTML=h}
function updateBase(n,v){var sc=loadSC();if(!sc[n])sc[n]={base:0,deduction:0};sc[n].base=parseFloat(v)||0;saveSC(sc);renderSalary()}
function updateDed(n,v){var sc=loadSC();if(!sc[n])sc[n]={base:0,deduction:0};sc[n].deduction=parseFloat(v)||0;saveSC(sc);renderSalary()}

// ====== ACCOUNTS ======
function renderAccounts(){if(userRole!=='admin')return;var d=loadD();var B={};for(var i=0;i<ACCOUNTS().length;i++)B[ACCOUNTS()[i]]={inflow:0,outflow:0,exIn:0,exOut:0,shIn:0,cur:ACCT_CUR()[ACCOUNTS()[i]]};for(var i=0;i<d.income.length;i++){var r=d.income[i];if(r.account&&B[r.account]&&r.currency===B[r.account].cur)B[r.account].inflow+=r.amount||0}for(var i=0;i<d.expense.length;i++){var r=d.expense[i];if(r.account&&B[r.account]&&r.currency===B[r.account].cur)B[r.account].outflow+=r.amount||0}for(var i=0;i<d.exchange.length;i++){var r=d.exchange[i];if(r.exType==='exchange'){if(r.fromAccount&&B[r.fromAccount])B[r.fromAccount].exOut+=r.fromAmt||0;if(r.toAccount&&B[r.toAccount])B[r.toAccount].exIn+=r.toAmt||0}else if(r.exType==='withdraw'){if(r.fromAccount&&B[r.fromAccount])B[r.fromAccount].exOut+=r.amount||0}else if(r.exType==='deposit'){if(r.toAccount&&B[r.toAccount])B[r.toAccount].exIn+=r.amount||0}}for(var i=0;i<d.shareholder.length;i++){var r=d.shareholder[i];if(r.account&&B[r.account]&&r.currency===B[r.account].cur)B[r.account].shIn+=r.amount||0;else{for(var j=0;j<ACCOUNTS().length;j++){if(ACCT_CUR()[ACCOUNTS()[j]]===r.currency)B[ACCOUNTS()[j]].shIn+=r.amount||0}}}var h='<div class="card"><h3>🏦 账户与余额</h3>';for(var i=0;i<ACCOUNTS().length;i++){var a=ACCOUNTS()[i],b=B[a];var net=b.inflow-b.outflow+b.exIn-b.exOut+b.shIn;h+='<div class="total-bar" style="flex-wrap:wrap;padding:12px 14px"><span class="label" style="font-weight:600;font-size:14px">'+a+'</span><span class="value" style="color:'+(net>=0?'var(--green)':'var(--red)')+'">'+fmtCur(net,b.cur)+'</span><div style="width:100%;display:flex;gap:8px;margin-top:6px;font-size:11px;color:var(--sub);flex-wrap:wrap">';if(b.inflow>0)h+='<span>📥收入 +'+fmtCur(b.inflow,b.cur)+'</span>';if(b.outflow>0)h+='<span>📤支出 -'+fmtCur(b.outflow,b.cur)+'</span>';if(b.exIn>0||b.exOut>0)h+='<span>💱换汇 +'+fmtCur(b.exIn,b.cur)+' -'+fmtCur(b.exOut,b.cur)+'</span>';if(b.shIn>0)h+='<span>👥出资 +'+fmtCur(b.shIn,b.cur)+'</span>';h+='</div></div>'}h+='</div>';document.getElementById('accounts-content').innerHTML=h}

// ====== DETAIL MODAL ======
function showDetail(id){var d=loadD();var all=d.income.concat(d.expense).concat(d.exchange).concat(d.shareholder);var rec=null;for(var i=0;i<all.length;i++){if(all[i].id===id){rec=all[i];break}}if(!rec)return;var h='';if(rec.type==='income'){h+='<h3>📥 收入详情</h3>';h+='<div class="line"><span>日期</span><span class="val">'+rec.date+'</span></div>';h+='<div class="line"><span>品类</span><span class="val">'+esc(rec.cat||'-')+'</span></div>';h+='<div class="line"><span>金额</span><span class="val" style="color:var(--green)">'+fmtCur(rec.amount,rec.currency)+'</span></div>';if(rec.account)h+='<div class="line"><span>账户</span><span class="val">'+esc(rec.account)+'</span></div>';if(rec.handler)h+='<div class="line"><span>经办人</span><span class="val">'+esc(rec.handler)+'</span></div>';if(rec.cost>0)h+='<div class="line"><span>成本</span><span class="val">'+fmtCur(rec.cost,rec.currency)+'</span></div>';if(rec.profit>0)h+='<div class="line"><span>利润</span><span class="val" style="color:var(--green)">'+fmtCur(rec.profit,rec.currency)+'</span></div>';if(rec.note)h+='<div class="line"><span>备注</span><span class="val">'+esc(rec.note)+'</span></div>'}else if(rec.type==='expense'){h+='<h3>📤 支出详情</h3>';h+='<div class="line"><span>日期</span><span class="val">'+rec.date+'</span></div>';h+='<div class="line"><span>品类</span><span class="val">'+esc(rec.cat||'-')+'</span></div>';h+='<div class="line"><span>金额</span><span class="val" style="color:var(--red)">'+fmtCur(rec.amount,rec.currency)+'</span></div>';if(rec.account)h+='<div class="line"><span>账户</span><span class="val">'+esc(rec.account)+'</span></div>';if(rec.handler)h+='<div class="line"><span>经办人</span><span class="val">'+esc(rec.handler)+'</span></div>';if(rec.note)h+='<div class="line"><span>备注</span><span class="val">'+esc(rec.note)+'</span></div>'}else if(rec.type==='exchange'){h+='<h3>💱 换汇详情</h3>';h+='<div class="line"><span>日期</span><span class="val">'+rec.date+'</span></div>';h+='<div class="line"><span>类型</span><span class="val">'+(rec.exType==='exchange'?'换汇':rec.exType==='withdraw'?'取现':'存钱')+'</span></div>';if(rec.fromAccount)h+='<div class="line"><span>换出账户</span><span class="val">'+esc(rec.fromAccount)+'</span></div>';if(rec.fromAmt)h+='<div class="line"><span>换出金额</span><span class="val" style="color:var(--red)">'+fmtCur(rec.fromAmt,rec.fromCur||'KZT')+'</span></div>';if(rec.toAccount)h+='<div class="line"><span>收到账户</span><span class="val">'+esc(rec.toAccount)+'</span></div>';if(rec.toAmt)h+='<div class="line"><span>收到金额</span><span class="val" style="color:var(--green)">'+fmtCur(rec.toAmt,rec.toCur||'KZT')+'</span></div>';if(rec.note)h+='<div class="line"><span>备注</span><span class="val">'+esc(rec.note)+'</span></div>'}else if(rec.type==='shareholder'){h+='<h3>👥 股东出资详情</h3>';h+='<div class="line"><span>日期</span><span class="val">'+rec.date+'</span></div>';h+='<div class="line"><span>股东</span><span class="val">'+esc(rec.name||'-')+'</span></div>';h+='<div class="line"><span>金额</span><span class="val" style="color:var(--primary)">'+fmtCur(rec.amount,rec.currency)+'</span></div>';if(rec.account)h+='<div class="line"><span>账户</span><span class="val">'+esc(rec.account)+'</span></div>';if(rec.note)h+='<div class="line"><span>备注</span><span class="val">'+esc(rec.note)+'</span></div>'}h+='<button class="btn btn-outline btn-block" style="margin-top:12px;color:var(--red)" onclick="deleteRecord('+id+')">🗑 删除记录</button>';document.getElementById('detail-content').innerHTML=h;document.getElementById('modal-detail').classList.add('show')}
function deleteRecord(id){if(!confirm('确定删除？此操作不可恢复。'))return;var d=loadD();for(var k in d){d[k]=d[k].filter(function(r){return r.id!==id})}saveD(d);document.getElementById('modal-detail').classList.remove('show');refreshAll();showToast('已删除')}

// ====== SETTINGS ======
function showSettings(){var s=loadS();document.getElementById('settings-comm').value=s.commRate||COMM_RATE;document.getElementById('settings-pwd').value='';document.getElementById('modal-settings').classList.add('show')}
function saveSettings(){var s=loadS();var cr=parseFloat(document.getElementById('settings-comm').value);if(cr>0&&cr<=100)s.commRate=cr;var np=document.getElementById('settings-pwd').value.trim();if(np)s.pwd=np;saveS(s);document.getElementById('modal-settings').classList.remove('show');showToast('设置已保存 ✅')}

// ====== CSV IMPORT ======
function downloadCSVTemplate(){var header='类型,日期,币种,账户,品类,经办人,金额,成本,备注\n';var ex=['收入,2024-01-15,KZT,Kaspi店铺,销售收入,张三,50000,30000,备注','支出,2024-01-15,CNY,微信/支付宝CNY,进货,李四,2000,,运费','股东出资,2024-01-16,KZT,银行KZT,,张三,100000,,'].join('\n');var csv=header+ex;var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='蜜雪记账模板.csv';a.click();URL.revokeObjectURL(url);showToast('模板已下载')}
function importCSV(input){var file=input.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){var text=e.target.result;if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);var lines=text.split(/\r?\n/).filter(function(l){return l.trim()});if(lines.length<2){showToast('CSV格式错误');return}var d=loadD();var count=0;for(var i=1;i<lines.length;i++){var cols=parseCSVLine(lines[i]);if(cols.length<4)continue;var type=cols[0].trim();var date=cols[1].trim();var cur=cols[2].trim();if(CURRENCIES.indexOf(cur)<0)cur='KZT';if(!date||!/\d{4}-\d{2}-\d{2}/.test(date))continue;if(type==='收入'){var amt=parseFloat(cols[6])||0;var cost=parseFloat(cols[7])||0;d.income.push({id:Date.now()+count,type:'income',date:date,currency:cur,account:cols[3].trim()||'现金KZT',cat:cols[4].trim()||'销售收入',handler:cols[5].trim()||'',amount:amt,cost:cost,profit:Math.max(0,amt-cost),note:cols[8]?cols[8].trim():''});count++}else if(type==='支出'){var amt=parseFloat(cols[6])||0;d.expense.push({id:Date.now()+count+1e6,type:'expense',date:date,currency:cur,account:cols[3].trim()||'现金KZT',cat:cols[4].trim()||'其他',handler:cols[5].trim()||'',amount:amt,note:cols[8]?cols[8].trim():''});count++}else if(type==='股东出资'){var amt=parseFloat(cols[6])||0;d.shareholder.push({id:Date.now()+count+2e6,type:'shareholder',date:date,name:cols[5].trim()||'股东',currency:cur,account:cols[3].trim()||'银行KZT',amount:amt,note:cols[8]?cols[8].trim():''});count++}}saveD(d);updateHandlerList();refreshAll();showToast('成功导入 '+count+' 条 ✅')};reader.readAsText(file,'UTF-8');input.value=''}
function parseCSVLine(line){var result=[];var current='';var inQuotes=false;for(var i=0;i<line.length;i++){var ch=line[i];if(inQuotes){if(ch==='"'){if(i+1<line.length&&line[i+1]==='"'){current+='"';i++}else inQuotes=false}else current+=ch}else{if(ch==='"')inQuotes=true;else if(ch===','){result.push(current);current=''}else current+=ch}}result.push(current);return result}

// ====== HANDLER LIST ======
function updateHandlerList(){var d=loadD();var handlers={};for(var i=0;i<d.income.length;i++){if(d.income[i].handler)handlers[d.income[i].handler]=true}for(var i=0;i<d.expense.length;i++){if(d.expense[i].handler)handlers[d.expense[i].handler]=true}var list=document.getElementById('handler-list');list.innerHTML='';var names=[];for(var k in handlers)names.push(k);names.sort();for(var i=0;i<names.length;i++)list.innerHTML+='<option value="'+esc(names[i])+'">'}

// ====== NOTIFICATION ======
function sendNotify(type,rec){var name=rec.cat||rec.name||'';var amt=rec.amount||0;var msg='【蜜雪合伙店】'+type+'通知\n账户：'+(rec.account||'')+'\n项目：'+name+'\n金额：'+fmtCur(amt,rec.currency||'KZT')+'\n时间：'+new Date().toLocaleString();try{fetch('/api/mailer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject:'蜜雪记账 - '+type+' - '+name,body:msg.replace(/\n/g,'<br>')})}).catch(function(){})}catch(e){}}

// ====== UTILS ======
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function refreshAll(){renderIncome();renderExpense();renderExchange();renderShareholder();renderAccounts();if(userRole==='admin'){renderSummary();renderAnalysis();renderSalary()}}

// ====== INIT ======
(function(){var modals=document.querySelectorAll('.modal-overlay');for(var i=0;i<modals.length;i++){modals[i].addEventListener('click',function(e){if(e.target===this&&this.id!=='modal-detail')this.classList.remove('show')})}})();

</script>
