<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>蜜雪合伙店记账本</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#10b981;--gl:#d1fae5;--r:#ef4444;--rl:#fee2e2;--bg:#f5f5f5;--card:#fff;--tx:#1f2937;--sub:#6b7280;--bd:#e5e7eb;--p:#f59e0b;--pl:#fef3c7}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;padding-bottom:80px}
header{background:var(--p);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:18px}
header button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 10px;border-radius:6px;font-size:13px;cursor:pointer}
#login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#login-screen h2{font-size:24px;margin-bottom:8px}
#login-screen .sub{font-size:13px;color:var(--sub);margin-bottom:24px}
.login-card{background:var(--card);border-radius:16px;padding:24px;width:100%;max-width:360px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.tab-row{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:16px}
.tab-row button{flex:1;padding:9px;border:0;background:none;border-radius:6px;font-size:14px;cursor:pointer}
.tab-row button.active{background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:600}
.hidden{display:none!important}
.login-error{color:var(--r);font-size:13px;margin-top:8px;text-align:center}
input,select,textarea{width:100%;padding:10px;border:1px solid var(--bd);border-radius:8px;font-size:14px;outline:none;background:var(--card);font-family:inherit;margin-bottom:2px}
input:focus,select:focus,textarea:focus{border-color:var(--p)}
label{display:block;font-size:12px;color:var(--sub);margin-top:10px;margin-bottom:4px}
.btn{display:block;width:100%;padding:11px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;text-align:center}
.btn-primary{background:var(--p);color:#fff}
.btn-ghost{background:var(--bg);color:var(--tx)}
.btn-block{margin-top:10px}
.btn-sm{padding:8px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--card);font-size:13px;cursor:pointer}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;border-top:1px solid var(--bd);z-index:50;overflow-x:auto}
.tab-bar button{flex:1;min-width:fit-content;padding:10px 6px;border:none;background:none;font-size:11px;color:var(--sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;white-space:nowrap}
.tab-bar button .icon{font-size:18px}
.tab-bar button.active{color:var(--p);font-weight:600}
.page{display:none;padding:10px 14px}
.page.active{display:block;padding-bottom:70px}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:15px;margin-bottom:10px}
.record-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.record-item:last-child{border-bottom:none}
.record-info{flex:1;min-width:0}
.record-info .cat{font-size:14px;font-weight:600}
.record-info .meta{font-size:11px;color:var(--sub);margin-top:2px}
.record-amount{text-align:right;font-weight:700;font-size:16px}
.record-amount.income{color:var(--g)}
.record-amount.expense{color:var(--r)}
.record-amount .sub{display:block;font-size:11px;color:var(--sub);font-weight:400}
.empty-state{text-align:center;padding:40px 20px;color:var(--sub)}
.empty-state .icon{font-size:36px;margin-bottom:8px}
.total-bar{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px}
.total-bar .value{font-weight:700;font-size:16px}
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filter-row select,.filter-row input{padding:6px 10px;font-size:12px;border-radius:6px;width:auto}
.filter-tag{padding:4px 10px;border-radius:12px;border:1px solid var(--bd);background:var(--card);font-size:11px;cursor:pointer;white-space:nowrap}
.filter-tag.active{background:var(--p);color:#fff;border-color:var(--p)}
.section-title{font-size:14px;font-weight:700;margin:16px 0 8px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.summary-item{background:var(--card);border-radius:12px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.summary-item .val{font-size:20px;font-weight:700;margin:4px 0}
.summary-item .lbl{font-size:11px;color:var(--sub)}
.salary-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--bd);flex-wrap:wrap;font-size:13px}
.salary-row .sname{font-weight:600;width:70px}
.salary-row .sval{font-weight:700;min-width:80px;text-align:right}
.salary-row input{width:60px;padding:4px;font-size:12px;text-align:center}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:20px;width:92%;max-width:420px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:14px;text-align:center}
.modal .btn-row{display:flex;gap:8px;margin-top:14px}
.modal .btn-row button{flex:1}
.form-row{display:flex;gap:8px}
.form-row>div{flex:1}
.fab{position:fixed;bottom:75px;right:20px;width:48px;height:48px;border-radius:24px;background:var(--p);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(245,158,11,.4);z-index:40;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="login-screen">
<h2>🍦 蜜雪合伙店</h2>
<div class="sub">蜜雪冰城 · 多币种记账</div>
<div class="login-card">
<div class="tab-row">
<button class="active" onclick="switchLoginTab('admin')">🔐 管理员</button>
<button onclick="switchLoginTab('staff')">📝 员工记账</button>
</div>
<div id="login-admin-panel">
<label>管理员密码</label>
<input type="password" id="admin-pwd" placeholder="请输入密码">
<button class="btn btn-primary btn-block" onclick="loginAsAdmin()">登录</button>
</div>
<div id="login-staff-panel" class="hidden">
<p style="font-size:13px;color:var(--sub);margin-bottom:12px;text-align:center">员工无需密码，只能查看2天内记录</p>
<button class="btn btn-primary btn-block" onclick="loginAsStaff()">进入记账</button>
</div>
<div class="login-error" id="login-error"></div>
</div>
</div>

<header id="app-header" style="display:none">
<h1>🍦 蜜雪合伙店</h1>
<div>
<button onclick="openSettings()" id="settings-btn" style="display:none">⚙️</button>
<button onclick="logout()" id="logout-btn">退出</button>
</div>
</header>

<div id="page-income" class="page active">
<div class="filter-row">
<select id="income-month" onchange="renderIncome()"><option value="">全部月份</option></select>
<div id="inc-cat-filter"></div>
</div>
<div class="total-bar" id="income-total"></div>
<div id="income-list"></div>
</div>

<div id="page-expense" class="page">
<div class="filter-row">
<select id="expense-month" onchange="renderExpense()"><option value="">全部月份</option></select>
<div id="exp-cat-filter"></div>
</div>
<div class="total-bar" id="expense-total"></div>
<div id="expense-list"></div>
</div>

<div id="page-exchange" class="page">
<div class="filter-row">
<select id="exchange-month" onchange="renderExchange()"><option value="">全部月份</option></select>
</div>
<div id="exchange-list"></div>
</div>

<div id="page-shareholder" class="page">
<div class="filter-row">
<select id="shareholder-month" onchange="renderShareholder()"><option value="">全部月份</option></select>
</div>
<div class="total-bar" id="shareholder-total"></div>
<div id="shareholder-list"></div>
</div>

<div id="page-summary" class="page">
<div class="filter-row">
<select id="summary-month" onchange="renderSummary()"><option value="">全部月份</option></select>
<select id="summary-store" onchange="renderSummary()"><option value="全部">全部经办人</option></select>
</div>
<div id="summary-content"></div>
</div>

<div id="page-analysis" class="page">
<div class="filter-row">
<select id="analysis-month" onchange="renderAnalysis()"><option value="">全部月份</option></select>
<select id="analysis-store" onchange="renderAnalysis()"><option value="全部">全部经办人</option></select>
</div>
<div id="analysis-content"></div>
</div>

<div id="page-salary" class="page"><div id="salary-content"></div></div>

<div id="page-accounts" class="page">
<div class="filter-row">
<select id="accounts-month" onchange="renderAccounts()"><option value="">全部月份</option></select>
</div>
<div id="accounts-content"></div>
</div>

<div class="tab-bar" id="tab-bar" style="display:none">
<button class="active" onclick="switchTab('page-income',this)"><span class="icon">📥</span>收入</button>
<button onclick="switchTab('page-expense',this)"><span class="icon">📤</span>支出</button>
<button onclick="switchTab('page-exchange',this)"><span class="icon">💱</span>换汇</button>
<button onclick="switchTab('page-shareholder',this)"><span class="icon">👥</span>股东</button>
<button class="admin-only" onclick="switchTab('page-salary',this)"><span class="icon">💰</span>工资</button>
<button class="admin-only" onclick="switchTab('page-summary',this)"><span class="icon">📊</span>汇总</button>
<button class="admin-only" onclick="switchTab('page-analysis',this)"><span class="icon">📈</span>分析</button>
<button onclick="switchTab('page-accounts',this)"><span class="icon">🏦</span>账户</button>
</div>

<button class="fab" id="fab-btn" style="display:none" onclick="openFab()">+</button>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay">
<div class="modal">
<h3 id="modal-title">记收入</h3>
<label>日期</label><input type="date" id="modal-date">
<label>经办人</label><input id="modal-handler" list="handler-datalist" placeholder="选择或输入"><datalist id="handler-datalist"></datalist>

<div id="modal-shared-fields">
<label>金额</label><input type="number" id="modal-amount" placeholder="0" step="0.01">
<div class="form-row"><div><label>币种</label><select id="modal-currency"></select></div><div><label>账户</label><select id="modal-account"></select></div></div>
<div id="modal-cat-row"><label>品类</label><select id="modal-cat"></select></div>
</div>

<div id="modal-orders-field"><div class="form-row"><div><label>订单数</label><input type="number" id="modal-orders" value="1"></div><div><label>杯数</label><input type="number" id="modal-cups" value="0"></div></div></div>

<div id="modal-exchange-fields" class="hidden">
<label>换汇类型</label><select id="modal-ex-type" onchange="toggleExType()"><option value="exchange">换汇（双账户）</option><option value="withdraw">取现</option><option value="deposit">存钱</option></select>
<div id="modal-ex-dual"><div class="form-row"><div><label>换出账户</label><select id="modal-ex-from-account"></select></div><div><label>币种</label><select id="modal-ex-from-cur"></select></div></div><label>换出金额</label><input type="number" id="modal-ex-from-amount" placeholder="0" step="0.01"><div class="form-row"><div><label>收到账户</label><select id="modal-ex-to-account"></select></div><div><label>币种</label><select id="modal-ex-to-cur"></select></div></div><label>收到金额</label><input type="number" id="modal-ex-to-amount" placeholder="0" step="0.01"></div>
<div id="modal-ex-single" class="hidden"><div class="form-row"><div><label>账户</label><select id="modal-ex-cash-account"></select></div><div><label>币种</label><select id="modal-ex-cash-cur"></select></div></div></div>
</div>

<div id="modal-shareholder-fields" class="hidden">
<label>股东名称</label><input id="modal-sh-investor" placeholder="股东姓名">
<div class="form-row"><div><label>币种</label><select id="modal-sh-currency"></select></div><div><label>金额</label><input type="number" id="modal-sh-amount" placeholder="0" step="0.01"></div></div>
</div>

<label>备注</label><textarea id="modal-note" rows="2"></textarea>
<div class="btn-row">
<button class="btn btn-ghost" id="modal-delete" style="display:none" onclick="deleteRecord()">🗑 删除</button>
<button class="btn btn-ghost" onclick="closeModal()">取消</button>
<button class="btn btn-primary" id="modal-save" onclick="saveRecord()">保存</button>
</div>
</div>
</div>

<div class="modal-overlay" id="settings-modal">
<div class="modal"><h3>⚙️ 设置</h3><div id="settings-list"></div></div>
</div>


<script>
var ADMIN_PWD="admin888";
var userRole=sessionStorage.getItem("mx_role")||"";
var activeCatFilter="??";
var currentType="income";
var currentEditIdx=-1;
var CURRENCIES=["KZT","CNY","USD"];
var INC_CATS=["门店销售","外卖平台","团购/预订","退款冲回","其他收入"];
var EXP_CATS=["房租","人工工资","原料/包材","水电网","税费","设备维修","物流运输","营销推广","平台手续费","办公杂费","其他支出"];
var ACCOUNTS=["??KZT","Kaspi??","??KZT","Wolt/Glovo???","??RMB","??/???RMB","USD??"];
var COMM_RATE=5;
var RATES={KZT_CNY:0.016,CNY_KZT:63,USD_KZT:460};
function loadD(){try{return JSON.parse(localStorage.getItem("mx_ledger")||"{\"income\":[],\"expense\":[],\"exchange\":[],\"shareholder\":[]}")}catch(e){return{income:[],expense:[],exchange:[],shareholder:[]}}}
function saveD(d){localStorage.setItem("mx_ledger",JSON.stringify(d))}
function loadSC(){try{return JSON.parse(localStorage.getItem("mx_salaries")||"{}")}catch(e){return{}}}
function saveSC(c){localStorage.setItem("mx_salaries",JSON.stringify(c))}
function loadPushS(){try{return JSON.parse(localStorage.getItem("mx_push")||"{\"enabled\":false,\"webhookUrl\":\"\"}")}catch(e){return{enabled:false,webhookUrl:""}}}
function savePushS(p){localStorage.setItem("mx_push",JSON.stringify(p))}
function loadEmailS(){try{return JSON.parse(localStorage.getItem("mx_email")||"{\"enabled\":false,\"smtp_host\":\"\",\"smtp_port\":465,\"smtp_user\":\"\",\"smtp_pass\":\"\",\"to_addr\":\"\"}")}catch(e){return{enabled:false,smtp_host:"",smtp_port:465,smtp_user:"",smtp_pass:"",to_addr:""}}}
function saveEmailS(e){localStorage.setItem("mx_email",JSON.stringify(e))}
function fmt(n){return Math.abs(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(ds){if(!ds)return"";var p=ds.split("-");return p[1]+"/"+p[2]}
function getM(ds){return ds?ds.slice(0,7):""}
function is2Day(ds){if(userRole==="admin")return true;try{var d=new Date(ds+"T00:00:00"),n=new Date();n.setDate(n.getDate()-2);n.setHours(0,0,0,0);return d>=n}catch(e){return true}}
function toKZT(amount,currency){var c=currency||"KZT";if(c==="KZT")return amount;if(c==="CNY"||c==="RMB")return amount*RATES.CNY_KZT;if(c==="USD")return amount*RATES.USD_KZT;return amount}
function fmtCur(amount,currency){var c=currency||"KZT";if(c==="KZT")return"\u20B8"+fmt(amount);if(c==="CNY"||c==="RMB")return"\u00A5"+fmt(amount);if(c==="USD")return"$"+fmt(amount);return fmt(amount)}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function switchLoginTab(t){document.querySelectorAll("#login-screen .tab-row button").forEach(function(b,i){b.classList.toggle("active",(i===0&&t==="admin")||(i===1&&t==="staff"))});document.getElementById("login-admin-panel").classList.toggle("hidden",t!=="admin");document.getElementById("login-staff-panel").classList.toggle("hidden",t!=="staff");document.getElementById("login-error").textContent=""}
function loginAsAdmin(){if(document.getElementById("admin-pwd").value===ADMIN_PWD){userRole="admin";sessionStorage.setItem("mx_role","admin");showApp()}else{document.getElementById("login-error").textContent="????"}}
function loginAsStaff(){userRole="staff";sessionStorage.setItem("mx_role","staff");showApp()}
function logout(){sessionStorage.removeItem("mx_role");location.reload()}
function showApp(){document.getElementById("login-screen").style.display="none";document.getElementById("app-header").style.display="flex";document.getElementById("tab-bar").style.display="flex";document.getElementById("fab-btn").style.display="block";applyPerms();refreshAll();populateMonths()}
function applyPerms(){var isA=userRole==="admin";document.getElementById("settings-btn").style.display=isA?"":"none";document.querySelectorAll(".admin-only").forEach(function(el){el.style.display=isA?"":"none"});if(!isA){switchTab("page-income",document.querySelector(".tab-bar button"))}}
function switchTab(pid,btn){document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});document.querySelectorAll(".tab-bar button").forEach(function(b){b.classList.remove("active")});var p=document.getElementById(pid);if(p)p.classList.add("active");if(btn)btn.classList.add("active");var renders={"page-income":renderIncome,"page-expense":renderExpense,"page-exchange":renderExchange,"page-shareholder":renderShareholder,"page-summary":renderSummary,"page-analysis":renderAnalysis,"page-salary":renderSalary,"page-accounts":renderAccounts};if(renders[pid])renders[pid]()}
function refreshFT(){document.querySelectorAll(".filter-tag").forEach(function(t){t.classList.toggle("active",t.textContent===activeCatFilter)})}
function openFab(){var tid=document.querySelector(".page.active");if(!tid)return;var id=tid.id;if(id==="page-income")openModal("income");else if(id==="page-expense")openModal("expense");else if(id==="page-exchange")openModal("exchange");else if(id==="page-shareholder")openModal("shareholder");else if(id==="page-salary")renderSalary()}
function closeSettings(){document.getElementById("settings-modal").classList.remove("show")}
function openModal(type,record,idx){currentType=type;currentEditIdx=(idx!==undefined&&idx>=0)?idx:-1;var titles={income:"???",expense:"???",exchange:"???",shareholder:"?????"};document.getElementById("modal-title").textContent=titles[type]||"??";document.getElementById("modal-delete").style.display=(currentEditIdx>=0)?"":"none";document.getElementById("modal-shared-fields").classList.toggle("hidden",type==="exchange"||type==="shareholder");document.getElementById("modal-orders-field").classList.toggle("hidden",type!=="income");document.getElementById("modal-exchange-fields").classList.toggle("hidden",type!=="exchange");document.getElementById("modal-shareholder-fields").classList.toggle("hidden",type!=="shareholder");document.getElementById("modal-cat-row").classList.toggle("hidden",type==="exchange"||type==="shareholder");var cats=type==="expense"?EXP_CATS:INC_CATS;var cs=document.getElementById("modal-cat");cs.innerHTML="";for(var i=0;i<cats.length;i++)cs.innerHTML+="<option value=\""+cats[i]+"\">"+cats[i]+"</option>";populateSelect("modal-currency",CURRENCIES);populateSelect("modal-account",ACCOUNTS);populateSelect("modal-ex-from-account",ACCOUNTS);populateSelect("modal-ex-to-account",ACCOUNTS);populateSelect("modal-ex-from-cur",CURRENCIES);populateSelect("modal-ex-to-cur",CURRENCIES);populateSelect("modal-ex-cash-account",ACCOUNTS);populateSelect("modal-ex-cash-cur",CURRENCIES);populateSelect("modal-sh-currency",CURRENCIES);populateHandlerDatalist();if(record){document.getElementById("modal-date").value=record.date||"";document.getElementById("modal-handler").value=record.handler||"";document.getElementById("modal-note").value=record.note||"";if(type==="income"||type==="expense"){document.getElementById("modal-amount").value=record.amount||"";document.getElementById("modal-currency").value=record.currency||"KZT";document.getElementById("modal-account").value=record.account||ACCOUNTS[0];document.getElementById("modal-cat").value=record.cat||(type==="expense"?EXP_CATS[0]:INC_CATS[0]);if(type==="income"){document.getElementById("modal-orders").value=record.orders||"";document.getElementById("modal-cups").value=record.cups||""}}else if(type==="exchange"){document.getElementById("modal-ex-type").value=record.exType||"exchange";toggleExType();if(record.exType&&record.exType!=="exchange"){document.getElementById("modal-ex-cash-account").value=record.fromAccount||record.toAccount||ACCOUNTS[0];document.getElementById("modal-ex-cash-cur").value=record.currency||"KZT";document.getElementById("modal-amount").value=record.amount||""}else{document.getElementById("modal-ex-from-account").value=record.fromAccount||ACCOUNTS[0];document.getElementById("modal-ex-to-account").value=record.toAccount||ACCOUNTS[1];document.getElementById("modal-ex-from-cur").value=record.fromCur||"KZT";document.getElementById("modal-ex-to-cur").value=record.toCur||"KZT";document.getElementById("modal-ex-from-amount").value=record.fromAmt||"";document.getElementById("modal-ex-to-amount").value=record.toAmt||""}}else if(type==="shareholder"){document.getElementById("modal-sh-investor").value=record.investor||"";document.getElementById("modal-sh-currency").value=record.currency||"CNY";document.getElementById("modal-sh-amount").value=record.amount||""}}else{document.getElementById("modal-date").value=new Date().toISOString().slice(0,10);document.getElementById("modal-handler").value="";document.getElementById("modal-note").value="";document.getElementById("modal-amount").value="";document.getElementById("modal-orders").value="1";document.getElementById("modal-cups").value="0";document.getElementById("modal-sh-amount").value="";document.getElementById("modal-sh-investor").value="";if(type==="exchange"){document.getElementById("modal-ex-type").value="exchange";toggleExType()}}document.getElementById("modal-overlay").classList.add("show")}
function populateSelect(id,arr){var s=document.getElementById(id);s.innerHTML="";for(var i=0;i<arr.length;i++)s.innerHTML+="<option value=\""+arr[i]+"\">"+arr[i]+"</option>"}

function renderSalary(){if(userRole!=="admin")return;var d=loadD(),sc=loadSC(),me=document.getElementById("salary-month"),month=me?me.value:"";var inc=d.income;if(month)inc=inc.filter(function(r){return getM(r.date)===month});var cm={};for(var i=0;i<inc.length;i++){var r=inc[i];if(r.handler)cm[r.handler]=(cm[r.handler]||0)+(r.amountKZT||0)*COMM_RATE/100}var nm={};for(var i=0;i<inc.length;i++)if(inc[i].handler)nm[inc[i].handler]=true;for(var k in sc)nm[k]=true;var names=Object.keys(nm).sort();var tp=0;var h="<div class=\"form-row\"><div><label>月份</label><input type=month id=\"salary-month\" value=\""+(month||new Date().toISOString().slice(0,7))+"\" onchange=\"renderSalary()\"></div></div>";h+="<div class=\"card\"><h3>工资 ("+(month||"全部")+") | 提成率: "+COMM_RATE+"%</h3>";if(names.length===0)h+="<div class=\"empty-state\">暂无数据</div>";else for(var i=0;i<names.length;i++){var n=names[i],cfg=sc[n]||{base:0,deduction:0},com=cm[n]||0,sal=cfg.base+com-cfg.deduction;tp+=sal;h+="<div class=\"salary-row\"><span class=\"sname\">"+n+"</span><span>底薪</span><input type=number value=\""+cfg.base+"\" onchange=\"updateSalaryCfg(\\x27"+n.replace(/'/g,"\\x27")+"\\x27,\\x27base\\x27,this.value)\"><span class=\"sval\" style=\"color:var(--g)\">提成 \u20B8"+fmt(com)+"</span><span>扣除</span><input type=number value=\""+cfg.deduction+"\" onchange=\"updateSalaryCfg(\\x27"+n.replace(/'/g,"\\x27")+"\\x27,\\x27deduction\\x27,this.value)\"><span class=\"sval\">实发 \u20B8"+fmt(sal)+"</span></div>"}h+="<div class=\"total-bar\" style=\"margin-top:10px\"><span>合计</span><span class=\"value\">\u20B8"+fmt(tp)+"</span></div></div>";document.getElementById("salary-content").innerHTML=h}
function updateSalaryCfg(n,key,v){var sc=loadSC();if(!sc[n])sc[n]={base:0,deduction:0};sc[n][key]=parseFloat(v)||0;saveSC(sc);renderSalary()}

function renderAccounts(){var d=loadD(),me=document.getElementById("accounts-month"),month=me?me.value:"";var inc=d.income,exp=d.expense,exc=d.exchange,sh=d.shareholder;if(month){inc=inc.filter(function(r){return getM(r.date)===month});exp=exp.filter(function(r){return getM(r.date)===month});exc=exc.filter(function(r){return getM(r.date)===month});sh=sh.filter(function(r){return getM(r.date)===month})}var A=[{n:"现金KZT",c:"KZT"},{n:"Kaspi店铺",c:"KZT"},{n:"银行KZT",c:"KZT"},{n:"Wolt/Glovo待结算",c:"KZT"},{n:"现金RMB",c:"CNY"},{n:"微信/支付宝RMB",c:"CNY"},{n:"USD现金",c:"USD"}];var B={};for(var i=0;i<A.length;i++)B[A[i].n]={in:0,out:0,exIn:0,exOut:0,shIn:0,cur:A[i].c};for(var i=0;i<inc.length;i++){var r=inc[i];if(r.account&&B[r.account]&&r.currency===B[r.account].cur)B[r.account].in+=r.amount||0}for(var i=0;i<exp.length;i++){var r=exp[i];if(r.account&&B[r.account]&&r.currency===B[r.account].cur)B[r.account].out+=r.amount||0}for(var i=0;i<exc.length;i++){var r=exc[i];if(r.exType==="exchange"){if(r.fromAccount&&B[r.fromAccount]&&r.fromCur===B[r.fromAccount].cur)B[r.fromAccount].exOut+=r.fromAmt||0;if(r.toAccount&&B[r.toAccount]&&r.toCur===B[r.toAccount].cur)B[r.toAccount].exIn+=r.toAmt||0}else if(r.exType==="withdraw"){if(r.fromAccount&&B[r.fromAccount]&&r.currency===B[r.fromAccount].cur)B[r.fromAccount].exOut+=r.amount||0}else if(r.exType==="deposit"){if(r.toAccount&&B[r.toAccount]&&r.currency===B[r.toAccount].cur)B[r.toAccount].exIn+=r.amount||0}}for(var i=0;i<sh.length;i++){var r=sh[i];if(!r.account&&B["现金RMB"]&&r.currency==="CNY")B["现金RMB"].shIn+=r.amount||0}var totalKZT=0;var h="<div class=\"card\"><h3>账户与余额 "+(month||"全部")+"</h3>";for(var i=0;i<A.length;i++){var a=A[i],b=B[a.n],net=b.in-b.out+b.exIn-b.exOut+b.shIn;totalKZT+=toKZT(net,a.c);h+="<div class=\"total-bar\" style=\"flex-wrap:wrap;padding:12px 14px\"><span class=\"label\" style=\"font-weight:600;font-size:14px\">"+a.n+"</span><span class=\"value\" style=\"color:"+(net>=0?"var(--g)":"var(--r)")+"\">"+fmtCur(net,a.c)+"</span><div style=\"width:100%;display:flex;gap:8px;margin-top:6px;font-size:11px;color:var(--sub);flex-wrap:wrap\">";if(b.in>0)h+="<span>+ "+fmtCur(b.in,a.c)+"</span>";if(b.out>0)h+="<span>- "+fmtCur(b.out,a.c)+"</span>";if(b.exIn>0||b.exOut>0)h+="<span>换 "+fmtCur(b.exIn,a.c)+" -"+fmtCur(b.exOut,a.c)+"</span>";if(b.shIn>0)h+="<span>出资 +"+fmtCur(b.shIn,a.c)+"</span>";h+="</div></div>"}h+="<div class=\"total-bar\" style=\"background:var(--p);color:#fff\"><span style=\"color:#fff\">总计(KZT)</span><span class=\"value\">\u20B8"+fmt(totalKZT)+"</span></div></div>";document.getElementById("accounts-content").innerHTML=h}

function refreshAll(){renderIncome();renderExpense();renderExchange();renderShareholder();renderAccounts();if(userRole==="admin"){renderSummary();renderAnalysis();renderSalary()}}

// Setup category filters
(function(){
var incF=document.getElementById("inc-cat-filter");
if(incF){incF.innerHTML="<button class=\"filter-tag active\" onclick=\"activeCatFilter='全部';renderIncome();refreshFT()\">全部</button>";for(var i=0;i<INC_CATS.length;i++)incF.innerHTML+="<button class=\"filter-tag\" onclick=\"activeCatFilter='"+INC_CATS[i].replace(/'/g,"\\x27")+"';renderIncome();refreshFT()\">"+INC_CATS[i]+"</button>"}
var expF=document.getElementById("exp-cat-filter");
if(expF){expF.innerHTML="<button class=\"filter-tag active\" onclick=\"activeCatFilter='全部';renderExpense();refreshFT()\">全部</button>";for(var i=0;i<EXP_CATS.length;i++)expF.innerHTML+="<button class=\"filter-tag\" onclick=\"activeCatFilter='"+EXP_CATS[i].replace(/'/g,"\\x27")+"';renderExpense();refreshFT()\">"+EXP_CATS[i]+"</button>"}
})();

// Event delegation for record-item clicks
document.addEventListener("click",function(e){var el=e.target.closest(".record-item");if(!el)return;var type=el.dataset.type;var idx=parseInt(el.dataset.idx);if(type&&idx>=0){var d=loadD();var rec=d[type]&&d[type][idx];if(rec)openModal(type,rec,idx)}});

// Close modals on overlay click
document.getElementById("modal-overlay").addEventListener("click",function(e){if(e.target===this)closeModal()});
document.getElementById("settings-modal").addEventListener("click",function(e){if(e.target===this)this.classList.remove("show")});

// INIT
if(userRole)showApp();

</script>
